/* ————————————————— Snd: صوت مولّد + مستويات مستقلة ————————————————— */
const Snd = {
  ctx:null, master:null, sfxBus:null, musBus:null, muted:false, started:false,
  musicVol:0.18, sfxVol:0.30, _chordStep:0, _nextChordT:0,
  init() {
    if (this.started) return;
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    this.ctx = new AC();
    this.master = this.ctx.createGain(); this.master.gain.value = this.muted?0:1; this.master.connect(this.ctx.destination);
    this.sfxBus = this.ctx.createGain(); this.sfxBus.gain.value = this.sfxVol; this.sfxBus.connect(this.master);
    this.musBus = this.ctx.createGain(); this.musBus.gain.value = this.musicVol; this.musBus.connect(this.master);
    this.started = true; this._startMusic();
  },
  resume(){ if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume(); },
  setMusic(v){ this.musicVol = Math.max(0, Math.min(1, v)); if (this.musBus) this.musBus.gain.setTargetAtTime(this.musicVol, this.ctx.currentTime, 0.02); saveSettings(); },
  setSfx(v){ this.sfxVol = Math.max(0, Math.min(1, v)); if (this.sfxBus) this.sfxBus.gain.setTargetAtTime(this.sfxVol, this.ctx.currentTime, 0.02); saveSettings(); },
  toggleMute(){ this.muted = !this.muted; if (this.master) this.master.gain.setTargetAtTime(this.muted?0:1, this.ctx.currentTime, 0.02); },
  _tone(f0,f1,dur,type,vol,when=0,bus=null,vary=0){
    if (!this.started) return;
    const t = this.ctx.currentTime + when, o = this.ctx.createOscillator(), g = this.ctx.createGain();
    const pitch = vary ? f0 * (0.85 + Math.random() * 0.3) : f0;
    o.type = type; o.frequency.setValueAtTime(pitch, t);
    if (f1 !== f0) o.frequency.exponentialRampToValueAtTime(Math.max(vary?f1*(0.85+Math.random()*0.3):f1,1), t+dur);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(vol, t+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
    o.connect(g); g.connect(bus||this.sfxBus); o.start(t); o.stop(t+dur+0.05);
  },
  flip(up){ up? this._tone(300,620,0.15,'triangle',0.9) : this._tone(620,300,0.15,'triangle',0.9); },
  death(){ this._tone(400,80,0.3,'sawtooth',0.7); },
  checkpoint(){ this._tone(523,523,0.12,'sine',0.8,0); this._tone(659,659,0.14,'sine',0.8,0.1); },
  winLevel(){ [523,659,784,1047].forEach((f,i)=>this._tone(f,f,0.14,'sine',0.8,i*0.09)); },
  land(){ this._tone(150,90,0.05,'triangle',0.35); },
  crumble(){ this._tone(120,60,0.18,'square',0.25); },
  trip(){ this._tone(700,480,0.1,'triangle',0.5); },
  shoot(){ this._tone(860,200,0.06,'square',0.4,0,0,true); this._tone(440,180,0.04,'triangle',0.25,0,0,true); },
  dry(){ this._tone(180,150,0.05,'square',0.25); },
  hit(){ this._tone(500,180,0.08,'square',0.4,0,0,true); },
  enemyDie(){ this._tone(320,90,0.14,'triangle',0.5,0,0,true); },
  bossHit(){ this._tone(240,120,0.09,'square',0.5,0,0,true); },
  gateOpen(){ [392,523,659].forEach((f,i)=>this._tone(f,f,0.13,'sine',0.6,i*0.08)); },
  dash(){ this._tone(800,400,0.1,'sine',0.5,0,0,true); },
  // موسيقى DOOM-style: BPM عالي · square bass · noise درامز · saw melodies
  _musicTheme:0, _musicBoss:false,
  MUSIC: {
    calm:{ // E minor — داكن لكن بسيط
      prog:[ [82.41,110,146.83,185], [73.42,98,130.81,164.81], [65.41,87.31,110,146.83], [73.42,98,130.81,164.81] ],
      riffs:[ 220,261.63,293.66,329.63,392 ], bpm:150, vol:0.16 },
    tense:{ // D harmonic minor — عدواني
      prog:[ [73.42,98,130.81,164.81], [65.41,87.31,110,146.83], [82.41,110,146.83,185], [55,73.42,98,110] ],
      riffs:[ 196,220,261.63,293.66,349.23 ], bpm:170, vol:0.18 },
    boss:{ // F# diminished — هستيري
      prog:[ [92.5,116.54,138.59,185], [77.78,98,116.54,155.56], [65.41,82.41,98,130.81], [103.83,130.81,155.56,207.65] ],
      riffs:[ 261.63,293.66,349.23,392,466.16 ], bpm:195, vol:0.22 },
  },
  CHORD_DUR:4, _chordStep:0, _nextChordT:0,
  setTheme(th,boss){
    if(this._musicTheme===th&&this._musicBoss===boss) return;
    this._musicTheme=th; this._musicBoss=boss;
    this._chordStep=0; this._nextChordT=this.ctx.currentTime+0.05;
  },
  _startMusic(){
    this._nextChordT = this.ctx.currentTime + 0.15;
    this._musicTheme = 0; this._musicBoss = false;
    setInterval(()=>{ if(!this.started) return;
      while (this._nextChordT < this.ctx.currentTime + 1.4){
        const m = this._musicBoss ? this.MUSIC.boss : (this._musicTheme===1 ? this.MUSIC.tense : this.MUSIC.calm);
        this._playMeasure(m, this._chordStep);
        this._nextChordT += this.CHORD_DUR; this._chordStep++;
      }
    }, 150);
  },
  _playMeasure(m, step){
    const D = this.CHORD_DUR, t=this._nextChordT, vol=m.vol;
    const chord = m.prog[step % m.prog.length];
    // Pad (أجواء خلفية)
    chord.forEach((f,i)=>this._pad(f,t,D+1.0,vol*0.5-i*0.03,'sine'));
    // Bass line — square wave aggressive
    this._bass(chord[0]/2, t, D, vol*0.7);
    // Guitar riff — melody منفردة
    const r = m.riffs;
    this._riff(r[(step*3)%5], t+0.1, vol*0.6);
    if(step%2===0) this._riff(r[(step*2+1)%5], t+1.8, vol*0.5);
    if(step%3===0) this._riff(r[(step*4)%5], t+2.9,  vol*0.45);
    // Drums — kick + snare + hihat
    this._kick(t, vol*0.6);
    this._snare(t+1.75, vol*0.5);
    this._kick(t+2.1, vol*0.5);
    this._hh(t+0.5, vol*0.3); this._hh(t+1.2, vol*0.25);
    this._hh(t+2.5, vol*0.3); this._hh(t+3.2, vol*0.25);
    // Double-kick fills
    if(step%2===1){ this._kick(t+0.9, vol*0.4); this._kick(t+1.2, vol*0.3); }
    if(step%3===2){ this._snare(t+0.9, vol*0.35); }
  },
  _bass(f,t,dur,vol){
    const o=this.ctx.createOscillator(), g=this.ctx.createGain(); o.type='square'; o.frequency.value=f;
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(vol,t+0.02);
    g.gain.setValueAtTime(vol,t+dur-0.2); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g); g.connect(this.musBus); o.start(t); o.stop(t+dur+0.05);
  },
  _riff(f,t,vol){
    const o=this.ctx.createOscillator(), g=this.ctx.createGain(); o.type='sawtooth'; o.frequency.value=f;
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(vol,t+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,t+1.2); o.connect(g); g.connect(this.musBus); o.start(t); o.stop(t+1.3);
  },
  _pad(f,t,dur,vol,type){
    const o=this.ctx.createOscillator(), g=this.ctx.createGain(); o.type=type; o.frequency.value=f;
    g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(vol,t+0.6);
    g.gain.setValueAtTime(vol,t+dur-0.8); g.gain.linearRampToValueAtTime(0.0001,t+dur);
    o.connect(g); g.connect(this.musBus); o.start(t); o.stop(t+dur+0.1);
  },
  _kick(t,vol){
    const o=this.ctx.createOscillator(), g=this.ctx.createGain(); o.type='sine'; o.frequency.setValueAtTime(200,t);
    o.frequency.exponentialRampToValueAtTime(40,t+0.08);
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.1);
    o.connect(g); g.connect(this.musBus); o.start(t); o.stop(t+0.12);
  },
  _snare(t,vol){
    const buf=this.ctx.createBuffer(1,Math.ceil(this.ctx.sampleRate*0.08),this.ctx.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length);
    const s=this.ctx.createBufferSource(); s.buffer=buf; const g=this.ctx.createGain();
    g.gain.setValueAtTime(vol*0.6,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.07);
    s.connect(g); g.connect(this.musBus); s.start(t); s.stop(t+0.09);
    // tone layer
    const o=this.ctx.createOscillator(), g2=this.ctx.createGain(); o.type='triangle'; o.frequency.value=180;
    g2.gain.setValueAtTime(vol*0.3,t); g2.gain.exponentialRampToValueAtTime(0.0001,t+0.05);
    o.connect(g2); g2.connect(this.musBus); o.start(t); o.stop(t+0.07);
  },
  _hh(t,vol){
    const buf=this.ctx.createBuffer(1,Math.ceil(this.ctx.sampleRate*0.025),this.ctx.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length*0.9);
    const s=this.ctx.createBufferSource(); s.buffer=buf; const g=this.ctx.createGain();
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.03);
    s.connect(g); g.connect(this.musBus); s.start(t); s.stop(t+0.04);
  },
};

/* حفظ/تحميل الإعدادات */
function saveSettings(){
  try { localStorage.setItem('flip_cfg', JSON.stringify({ lang:LANG, mus:Snd.musicVol, sfx:Snd.sfxVol, bestTimes:G.bestTimes||[] })); } catch(e){}
}
function loadSettings(){
  try {
    const s = JSON.parse(localStorage.getItem('flip_cfg'));
    if (s){ if (s.lang) LANG = s.lang; if (typeof s.mus==='number') Snd.musicVol = s.mus; if (typeof s.sfx==='number') Snd.sfxVol = s.sfx; G.bestTimes = s.bestTimes||[]; return true; }
  } catch(e){}
  return false;
}

/* ————————————————— تحليل المرحلة ————————————————— */
function parseLevel(idx) {
  const lv = LEVELS[idx], grid = lv.grid;
  const rows = grid.length, cols = grid[0].length, T = CFG.TILE;
  const solid = [], spikes = [], enemies = [], checkpoints = [];
  const platforms = [], crumble = [], crumbleMap = {}, trips = [];
  let star = null, spawn = { x:T*2, y:T*2 }, bossSpawn = null, secrets = [];
  const consumed = {};
  for (let r=0;r<rows;r++){ solid[r]=[];
    for (let c=0;c<cols;c++){
      const ch = grid[r][c]; solid[r][c] = (ch==='#'||ch==='x');
      const x=c*T, y=r*T;
      if (ch==='^') spikes.push({r,c,type:'up'});
      if (ch==='v') spikes.push({r,c,type:'down'});
      if (ch==='>') spikes.push({r,c,type:'right'});
      if (ch==='<') spikes.push({r,c,type:'left'});
      if (ch==='C') checkpoints.push({r,c,active:false});
      if (ch==='*') star = { x:x+T/2, y:y+T/2 };
      if (ch==='!') secrets.push({ x:x+T/2, y:y+T/2, found:false });
      if (ch==='P') spawn = { x:x+T/2-CFG.PSIZE/2, y:y+T-CFG.PSIZE };
      if (ch==='o') enemies.push(makeEnemy(grid,r,c,'h'));
      if (ch==='I') enemies.push(makeEnemy(grid,r,c,'v'));
      if (ch==='S') enemies.push(makeEnemy(grid,r,c,'s'));
      if (ch==='c') enemies.push(makeEnemy(grid,r,c,'c'));
      if (ch==='T') trips.push({r,c});
      if (ch==='B') bossSpawn = { x:x+T/2, y:y+T/2 };
      if (ch==='x'){ const o={r,c,state:'solid',timer:0}; crumble.push(o); crumbleMap[r+','+c]=o; }
      if ((ch==='H'||ch==='V') && !consumed[r+','+c]){
        let c2=c; while (c2+1<cols && grid[r][c2+1]===ch) c2++;
        for (let cc=c;cc<=c2;cc++) consumed[r+','+cc]=true;
        platforms.push({ axis: ch==='H'?'h':'v', baseX:x, baseY:y, x, y, w:(c2-c+1)*T, h:T,
          range:CFG.PLAT_RANGE, speed: ch==='H'?CFG.PLAT_SPEED_H:CFG.PLAT_SPEED_V, dx:0, dy:0 });
      }
    }
  }
  enemies.forEach((e,i)=>e.id=i);
  return { rows, cols, solid, spikes, enemies, checkpoints, platforms, crumble, crumbleMap, trips,
           star, spawn, bossSpawn, secrets,
           boss: !!lv.boss, bossType: lv.bossType||'warden', theme: lv.theme||0, w:cols*T, h:rows*T };
}

function makeEnemy(grid,r,c,axis){
  const T=CFG.TILE, R=CFG.ENEMY_R;
  const pass=(rr,cc)=> rr>=0&&rr<grid.length&&cc>=0&&cc<grid[0].length && grid[rr][cc]!=='#' && grid[rr][cc]!=='x';
  const isShooter = axis==='s';
  const isCharger = axis==='c';
  const hp = (isShooter||isCharger) ? 2 : CFG.ENEMY_HP;
  const e={ axis, x:c*T+T/2, y:r*T+T/2, dir:1, phase:(r*7+c)%100, hp, alive:true, fireCD:isShooter?Math.floor(Math.random()*40):0,
            chargeCD:isCharger?Math.floor(Math.random()*60)+30:0 };
  if (isShooter||isCharger){ e.minX=e.x; e.maxX=e.x; e.minY=e.y; e.maxY=e.y; return e; }
  if (axis==='h'){ let cl=c,cr=c;
    for(let i=0;i<CFG.ENEMY_PATROL;i++){ if(pass(r,cl-1)) cl--; else break; }
    for(let i=0;i<CFG.ENEMY_PATROL;i++){ if(pass(r,cr+1)) cr++; else break; }
    e.minX=cl*T+R+2; e.maxX=(cr+1)*T-R-2; e.minY=e.y; e.maxY=e.y;
  } else { let ru=r,rd=r;
    for(let i=0;i<CFG.ENEMY_PATROL;i++){ if(pass(ru-1,c)) ru--; else break; }
    for(let i=0;i<CFG.ENEMY_PATROL;i++){ if(pass(rd+1,c)) rd++; else break; }
    e.minY=ru*T+R+2; e.maxY=(rd+1)*T-R-2; e.minX=e.x; e.maxX=e.x;
  }
  return e;
}

function loadLevel(idx){
  G.lvl = idx; G.level = parseLevel(idx); G.tick = 0;
  G.killed = new Set();
  G.checkpoint = { x:G.level.spawn.x, y:G.level.spawn.y, grav:1 };
  G.gravDir = 1; G.bullets=[]; G.ebullets=[]; G.trails=[]; G.rings=[];
  G.gateOpen = false;   // البوابة تبدأ مقفولة كل مرحلة (تصلح باگ انتقالها بين المراحل)
  setupBoss();
  Snd.setTheme(G.level.theme||0, !!G.level.boss);
  respawn();
  G.camX = Math.max(0, Math.min(G.player.x - CFG.W/2, G.level.w - CFG.W));
  G.state='play'; G.flashT=90; G.msgT=0;
  G.transition = { alpha:0, dir:1, cb:null };
}

function setupBoss(){
  const L = G.level;
  if (!(L.boss && L.bossSpawn)){ G.boss = null; return; }
  const type = L.bossType || 'warden';
  const base = { type, x:L.bossSpawn.x, y:L.bossSpawn.y, atkT:0, windup:0, phase:1,
                 alive:true, hitFlash:0, charge:0, atkKind:0, spin:0, laser:null };
  if (type === 'tyrant'){
    // الطاغية: أضخم، أصح، يحوّم ويطارد، هجمات مختلفة تماماً
    G.boss = Object.assign(base, { vx:0, vy:0, hp:CFG.TYRANT_HP, maxHp:CFG.TYRANT_HP,
      r:CFG.TYRANT_R, homeY:L.bossSpawn.y, bob:0 });
  } else {
    // الحارس: يرتد ويطلق رشقات دائرية
    G.boss = Object.assign(base, { vx:CFG.BOSS_SPEED, vy:CFG.BOSS_SPEED*0.7,
      hp:CFG.BOSS_HP, maxHp:CFG.BOSS_HP, r:CFG.BOSS_R });
  }
}

function liveEnemies(){
  if (!G.level) return 0;
  return G.level.enemies.filter(e=>!G.killed.has(e.id)).length;
}

function respawn(){
  const p=G.player, L=G.level;
  p.x=G.checkpoint.x; p.y=G.checkpoint.y; p.vx=0; p.vy=0;
  G.gravDir=G.checkpoint.grav;
  p.grounded=true; p.coyote=0; p.buffer=0; p.airT=0; p.rotT=1; p.squash=0; p.ride=null; p.flipCD=0; p.fireCD=0; p.idleBob=0;
  G.bullets=[]; G.ebullets=[]; G.powerups=[];
  p.shield=0; p.rapid=0; p.dash=0; p.dashCD=0; p.canDash=true;
  p.heat=0; p.overheated=false; p.overheatCD=0;
  if (L){
    for (const cb of L.crumble){ cb.state='solid'; cb.timer=0; L.solid[cb.r][cb.c]=true; }
    // الأعداء الأحياء (اللي ماتقتلوش) يرجعوا لمكانهم
    for (const e of L.enemies){ e.alive = !G.killed.has(e.id); e.dir = 1; }
  }
  if (G.boss){ setupBoss(); }   // الزعيم يرجع كامل عند الموت
}

/* ————————————————— فيزياء وتصادم ————————————————— */
function isSolid(level,r,c){
  if (c<0||c>=level.cols) return true;
  if (r<0||r>=level.rows) return false;
  return level.solid[r][c];
}
function collideAxis(p,level,axis){
  const T=CFG.TILE,S=CFG.PSIZE;
  const x0=Math.floor(p.x/T),x1=Math.floor((p.x+S-0.01)/T);
  const y0=Math.floor(p.y/T),y1=Math.floor((p.y+S-0.01)/T);
  let hit=0;
  for(let r=y0;r<=y1;r++)for(let c=x0;c<=x1;c++){
    if(!isSolid(level,r,c)) continue;
    if(axis==='x'){ if(p.vx>0)p.x=c*T-S; else if(p.vx<0)p.x=(c+1)*T; p.vx=0; hit=1; }
    else { if(p.vy>0){p.y=r*T-S;hit=1;} else if(p.vy<0){p.y=(r+1)*T;hit=-1;} p.vy=0; }
    return hit;
  }
  return 0;
}
const aabb=(ax,ay,aw,ah,bx,by,bw,bh)=> ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;

function updatePlatforms(L){
  for (const pl of L.platforms){
    const span=pl.range*2; let ph=(G.tick*pl.speed)%span;
    const tri = ph<=pl.range ? ph : span-ph;
    const nx = pl.axis==='h'? pl.baseX+tri : pl.baseX;
    const ny = pl.axis==='v'? pl.baseY+tri : pl.baseY;
    pl.dx=nx-pl.x; pl.dy=ny-pl.y; pl.x=nx; pl.y=ny;
  }
}
function collidePlatformsX(p,L){ const S=CFG.PSIZE;
  for (const pl of L.platforms){ if(!aabb(p.x,p.y,S,S,pl.x,pl.y,pl.w,pl.h)) continue;
    if(p.vx>0){p.x=pl.x-S;p.vx=0;} else if(p.vx<0){p.x=pl.x+pl.w;p.vx=0;} }
}
function collidePlatformsY(p,L){ const S=CFG.PSIZE; let hit=0;
  for (const pl of L.platforms){ if(!aabb(p.x,p.y,S,S,pl.x,pl.y,pl.w,pl.h)) continue;
    if(p.vy>0){p.y=pl.y-S;p.vy=0;hit=1;if(G.gravDir>0)p.ride=pl;}
    else if(p.vy<0){p.y=pl.y+pl.h;p.vy=0;hit=-1;if(G.gravDir<0)p.ride=pl;} }
  return hit;
}
function triggerCrumbleUnder(p,L){
  const T=CFG.TILE,S=CFG.PSIZE;
  const row = G.gravDir>0 ? Math.floor((p.y+S+1)/T) : Math.floor((p.y-1)/T);
  const cA=Math.floor(p.x/T), cB=Math.floor((p.x+S-0.01)/T);
  for(let c=cA;c<=cB;c++){ const o=L.crumbleMap[row+','+c];
    if(o&&o.state==='solid'){ o.state='warn'; o.timer=CFG.CRUMBLE_WARN; Snd.crumble(); } }
}
function updateCrumble(p,L){
  const T=CFG.TILE,S=CFG.PSIZE;
  for(const o of L.crumble){
    if(o.state==='warn'){ if(--o.timer<=0){ o.state='gone'; o.timer=CFG.CRUMBLE_GONE; L.solid[o.r][o.c]=false; } }
    else if(o.state==='gone'){ if(--o.timer<=0){
      if(!aabb(p.x,p.y,S,S,o.c*T,o.r*T,T,T)){ o.state='solid'; L.solid[o.r][o.c]=true; } else o.timer=6; } }
  }
}
function doFlip(){
  const p=G.player;
  G.gravDir*=-1; p.vy=CFG.FLIP_KICK*G.gravDir;
  p.grounded=false; p.coyote=0; p.buffer=0; p.ride=null;
  p.rotFrom=G.gravDir>0?Math.PI:0; p.rotT=0;
  Snd.flip(G.gravDir<0);
  const cx=p.x+CFG.PSIZE/2, cy=p.y+CFG.PSIZE/2;
  spawnBurst(cx, cy, 10, '#4de3ff', 3);
  spawnRing(cx, cy, 10, 3, 40, 'rgba(77,227,255,0.5)', 2);
}
function killPlayer(){
  if(G.state!=='play') return;
  if(G.player.shield>0){ G.player.shield=0;
    Snd.trip(); spawnBurst(G.player.x+CFG.PSIZE/2, G.player.y+CFG.PSIZE/2, 22, '#7ac7ff', 5);
    spawnRing(G.player.x+CFG.PSIZE/2, G.player.y+CFG.PSIZE/2, 15, 4, 50, '#7ac7ff', 3);
    G.shake=6; G.flashT=15; G.dmgFlash=10; return; }
  const cx = G.player.x+CFG.PSIZE/2, cy = G.player.y+CFG.PSIZE/2;
  G.state='dead'; G.stateT=0; G.deaths++; G.shake=22; G.flashT=30; G.dmgFlash=20; Snd.death();
  G.player.killStreak = 0;
  spawnBurst(cx, cy, 40, '#ff4455', 7);
  spawnRing(cx, cy, 25, 5, 80, '#ff4455', 4);
  spawnRing(cx, cy, 18, 3, 50, '#ff8899', 3);
  // دائرة صدمة كبيرة
  for(let i=0;i<16;i++){ const a=i*0.393;
    G.particles.push({x:cx,y:cy,
      vx:Math.cos(a)*(3+Math.random()*5),vy:Math.sin(a)*(3+Math.random()*5),life:1,decay:0.015,col:'#ff8899',size:4+Math.random()*5}); }
}

/* ————————————————— قتال: إطلاق، طلقات، أعداء ————————————————— */
function tryShoot(){
  const p=G.player;
  if (G.state!=='play') return;
  if (p.fireCD>0) return;
  if (p.overheated){ Snd.dry(); G.msgT=60; return; }
  const cx=p.x+CFG.PSIZE/2, cy=p.y+CFG.PSIZE/2;
  const a=p.aim;
  G.bullets.push({ x:cx+Math.cos(a)*16, y:cy+Math.sin(a)*16,
                   vx:Math.cos(a)*CFG.BULLET_SPEED, vy:Math.sin(a)*CFG.BULLET_SPEED, life:CFG.BULLET_LIFE });
  p.heat = Math.min(CFG.HEAT_MAX, p.heat + CFG.HEAT_PER_SHOT);
  if (p.heat >= CFG.HEAT_MAX && !p.overheated){ p.overheated=true; p.overheatCD=CFG.HEAT_COOLDOWN; Snd.trip(); }
  p.fireCD=p.rapid>0?CFG.RAPID_CD:CFG.FIRE_CD;
  // ارتداد بسيط عكس التصويب — يمكن استغلاله للدفع
  p.vx -= Math.cos(a)*CFG.RECOIL; p.vy -= Math.sin(a)*CFG.RECOIL*0.6;
  Snd.shoot();
  spawnBurst(cx+Math.cos(a)*18, cy+Math.sin(a)*18, 3, '#ffe08a', 2);
}
function updateBullets(L){
  const T=CFG.TILE;
  for (let i=G.bullets.length-1;i>=0;i--){
    const b=G.bullets[i]; b.x+=b.vx; b.y+=b.vy; b.life--;
    let dead = b.life<=0;
    if(!dead){ const c=Math.floor(b.x/T), r=Math.floor(b.y/T); if(isSolid(L,r,c)){ dead=true; spawnBurst(b.x,b.y,5,'#9fb6d0',2); } }
    if(!dead){
      for(const e of L.enemies){ if(!e.alive) continue;
        const eR = e.axis==='s' ? CFG.SHOOTER_R : CFG.ENEMY_R;
        const dx=b.x-e.x, dy=b.y-e.y;
        if(dx*dx+dy*dy < (eR+CFG.BULLET_R)*(eR+CFG.BULLET_R)){
          e.hp--; dead=true; G.hitstop=3;
          if(e.hp<=0){ G.hitstop=5; e.alive=false; G.killed.add(e.id); Snd.enemyDie();
            const col=e.axis==='v'?'#c774ff':(e.axis==='s'?'#ff77dd':(e.axis==='c'?'#ff6644':'#ff9f43'));
            spawnBurst(e.x,e.y,20,col,5);
            spawnRing(e.x,e.y,18,6,60,col,3);
            G.player.killStreak++; G.player.totalKills++;
            if((e.axis==='s'||e.axis==='c') && Math.random()<CFG.POWERUP_DROP) spawnPowerup(e.x,e.y);
            if(!(e.axis==='s'||e.axis==='c') && Math.random()<CFG.POWERUP_DROP*0.6) spawnPowerup(e.x,e.y);
            if(liveEnemies()===0 && !G.gateOpen && !L.boss){ G.gateOpen=true; G.msgT=120; Snd.gateOpen(); }
          } else { Snd.hit(); spawnBurst(b.x,b.y,6,'#ffd0d0',2.5,{col2:'#ffe08a'}); spawnRing(b.x,b.y,6,3,20,'rgba(255,200,200,0.5)',2); }
          break;
        }
      }
    }
    if(!dead && G.boss && G.boss.alive){
      const bo=G.boss, dx=b.x-bo.x, dy=b.y-bo.y;
      if(dx*dx+dy*dy < (bo.r+CFG.BULLET_R)*(bo.r+CFG.BULLET_R)){
        bo.hp--; bo.hitFlash=6; dead=true; G.hitstop=6; Snd.bossHit();
        spawnBurst(b.x,b.y,10,'#ffd0d0',3,{col2:'#ffe08a'});
        spawnRing(b.x,b.y,8,4,25,'rgba(255,200,200,0.5)',2);
        if(bo.hp<=0){ G.hitstop=12; bo.alive=false; bossDefeated(); }
        else if(bo.hp<=bo.maxHp/2) bo.phase=2;
      }
    }
    if(dead) G.bullets.splice(i,1);
  }
}
function updateEnemies(L,px0,px1,py0,py1){
  for(const e of L.enemies){ if(!e.alive) continue;
    if(e.axis==='h'){ e.x+=CFG.ENEMY_SPEED*e.dir; if(e.x<e.minX){e.x=e.minX;e.dir=1;} if(e.x>e.maxX){e.x=e.maxX;e.dir=-1;} }
    else if(e.axis==='v'){ e.y+=CFG.ENEMY_SPEED_V*e.dir; if(e.y<e.minY){e.y=e.minY;e.dir=1;} if(e.y>e.maxY){e.y=e.maxY;e.dir=-1;} }
    else if(e.axis==='c'){
      if(--e.chargeCD<=0 && !e._charging){
        const dx=G.player.x+CFG.PSIZE/2-e.x, dy=G.player.y+CFG.PSIZE/2-e.y;
        if(dx*dx+dy*dy < 320*320){ e._charging=true; e._cvx=Math.sign(dx)*CFG.ENEMY_SPEED*3; e._cvy=Math.sign(dy)*CFG.ENEMY_SPEED_V*3; e.chargeCD=120;
          spawnBurst(e.x,e.y,6,'#ff6644',3); } }
      if(e._charging){ e.x+=e._cvx; e.y+=e._cvy; e._chargeLife=(e._chargeLife||30)-1;
        if(e._chargeLife<=0){ e._charging=false; e._chargeLife=0; } }
      else { e.chargeCD=Math.max(1,e.chargeCD-1); }
    } else if(e.axis==='s'){
      if((--e.fireCD)<=0){
        e.fireCD=CFG.SHOOTER_FIRE_CD;
        const a=Math.atan2(G.player.y+CFG.PSIZE/2-e.y, G.player.x+CFG.PSIZE/2-e.x);
        G.ebullets.push({x:e.x,y:e.y,vx:Math.cos(a)*CFG.SHOOTER_BSPEED,vy:Math.sin(a)*CFG.SHOOTER_BSPEED,life:CFG.EBULLET_LIFE,_purple:true});
        Snd.hit();
      }
    }
    if(G.debug.noEnemies) continue;
    const cx=Math.max(px0,Math.min(e.x,px1)), cy=Math.max(py0,Math.min(e.y,py1));
    const dx=e.x-cx, dy=e.y-cy;
    if(dx*dx+dy*dy < CFG.ENEMY_HIT_R*CFG.ENEMY_HIT_R){ killPlayer(); return true; }
  }
  return false;
}

/* ————————————————— الزعيم ————————————————— */
function bossDefeated(){
  const bo=G.boss;
  const col = bo.type==='tyrant' ? '#c58bff' : '#ffd94d';
  spawnBurst(bo.x,bo.y,50,col,6);
  spawnRing(bo.x,bo.y,30,10,120,col,6);
  spawnRing(bo.x,bo.y,20,5,80,'#ffffff',4);
  G.gateOpen=true;
  G.state='levelend'; G.stateT=0; Snd.winLevel(); G.shake=24;
}
function updateBoss(L,p){
  const bo=G.boss; if(!bo||!bo.alive) return;
  if(bo.hitFlash>0) bo.hitFlash--;
  if(bo.type==='tyrant') updateTyrant(L,p,bo); else updateWarden(L,p,bo);
  if(!bo.alive || G.state!=='play') return;
  // تصادم الزعيم مع اللاعب (مشترك)
  const pcx=p.x+CFG.PSIZE/2, pcy=p.y+CFG.PSIZE/2, dx=pcx-bo.x, dy=pcy-bo.y;
  if(dx*dx+dy*dy < (bo.r+CFG.PSIZE/2*0.8)*(bo.r+CFG.PSIZE/2*0.8)){ killPlayer(); }
}

/* الحارس (زعيم 1): يرتد داخل الساحة + رشقات دائرية + اندفاع بالطور 2 */
function updateWarden(L,p,bo){
  const T=CFG.TILE;
  if(bo.charge>0){ bo.charge--; bo.x+=bo.cvx; bo.y+=bo.cvy; }
  else { bo.x+=bo.vx; bo.y+=bo.vy; }
  const mC=Math.floor(bo.x/T), mR=Math.floor(bo.y/T);
  if(isSolid(L,mR,Math.floor((bo.x-bo.r)/T))||bo.x-bo.r<T){ bo.x=Math.max(bo.x,T+bo.r); bo.vx=Math.abs(bo.vx); if(bo.charge>0)bo.cvx=Math.abs(bo.cvx); }
  if(isSolid(L,mR,Math.floor((bo.x+bo.r)/T))||bo.x+bo.r>L.w-T){ bo.x=Math.min(bo.x,L.w-T-bo.r); bo.vx=-Math.abs(bo.vx); if(bo.charge>0)bo.cvx=-Math.abs(bo.cvx); }
  if(isSolid(L,Math.floor((bo.y-bo.r)/T),mC)||bo.y-bo.r<T){ bo.y=Math.max(bo.y,T+bo.r); bo.vy=Math.abs(bo.vy); if(bo.charge>0)bo.cvy=Math.abs(bo.cvy); }
  if(isSolid(L,Math.floor((bo.y+bo.r)/T),mC)||bo.y+bo.r>L.h-T){ bo.y=Math.min(bo.y,L.h-T-bo.r); bo.vy=-Math.abs(bo.vy); if(bo.charge>0)bo.cvy=-Math.abs(bo.cvy); }
  bo.atkT++;
  const period = bo.phase===2 ? CFG.BOSS_ATK_PERIOD*0.6 : CFG.BOSS_ATK_PERIOD;
  if(bo.windup>0){ bo.windup--;
    // Show attack target indicator
    if(bo.windup === 15){
      if(bo.pendingCharge){ /* visual cue: line to player */
        const a=Math.atan2(p.y+CFG.PSIZE/2-bo.y, p.x+CFG.PSIZE/2-bo.x);
        for(let i=0;i<6;i++) G.particles.push({x:bo.x+Math.cos(a)*(bo.r+10), y:bo.y+Math.sin(a)*(bo.r+10),
          vx:0,vy:0,life:1,decay:0.04,col:'#ff5566',size:4});
      } else { /* ring burst warning */
        spawnRing(bo.x,bo.y,16,bo.r+5,bo.r+25,'rgba(255,85,102,0.3)',3);
      }
    }
    if(bo.windup===0){ const pcx=p.x+CFG.PSIZE/2, pcy=p.y+CFG.PSIZE/2;
      if(bo.pendingCharge){ const a=Math.atan2(pcy-bo.y, pcx-bo.x); bo.charge=26; bo.cvx=Math.cos(a)*6.5; bo.cvy=Math.sin(a)*6.5; bo.pendingCharge=false; }
      else { const n=bo.phase===2?12:8; for(let i=0;i<n;i++){ const a=i/n*Math.PI*2+(bo.atkT*0.1);
        G.ebullets.push({x:bo.x,y:bo.y,vx:Math.cos(a)*CFG.EBULLET_SPEED,vy:Math.sin(a)*CFG.EBULLET_SPEED,life:CFG.EBULLET_LIFE}); } Snd.hit(); }
    }
  } else if(bo.atkT>=period){ bo.atkT=0; bo.windup=CFG.BOSS_WINDUP;
    bo.pendingCharge = bo.phase===2 && (Math.floor(bo.x+bo.y)%2===0); }
}

/* الطاغية (زعيم 2): يحوّم ويطاردك أفقياً + رشقة موجّهة + مطر رصاص + نبضة تقلب جاذبيتك (طور 2) */
function updateTyrant(L,p,bo){
  const T=CFG.TILE, pcx=p.x+CFG.PSIZE/2, pcy=p.y+CFG.PSIZE/2;
  // حركة: يحوّم أعلى الساحة ويلاحق اللاعب أفقياً
  bo.bob += 0.045; bo.y = bo.homeY + Math.sin(bo.bob)*18;
  const dir = Math.sign(pcx - bo.x);
  bo.x += dir * CFG.TYRANT_TRACK * (bo.phase===2?1.35:1);
  bo.x = Math.max(T+bo.r, Math.min(L.w-T-bo.r, bo.x));
  bo.spin += 0.016 + 0.04*(1 - bo.hp/bo.maxHp);
  bo.atkT++;
  const period = bo.phase===2 ? CFG.TYRANT_ATK_PERIOD*0.62 : CFG.TYRANT_ATK_PERIOD;
  if(bo.windup>0){ bo.windup--;
    // Attack warning based on kind
    if(bo.windup===15){
      if(bo.atkKind===0){ /* aimed fan: lines toward player */
        const a=Math.atan2(pcy-bo.y, pcx-bo.x);
        for(let i=-2;i<=2;i++){ const aa=a+i*0.26;
          for(let j=0;j<3;j++) G.particles.push({x:bo.x+Math.cos(aa)*(bo.r+8+j*8), y:bo.y+Math.sin(aa)*(bo.r+8+j*8),
            vx:0,vy:0,life:1,decay:0.05,col:'#ff77dd',size:3}); }
      } else if(bo.atkKind===1){ /* rain: highlight columns */
        for(let i=0;i<4;i++) spawnBurst(T + i*(L.w-2*T)/4, bo.r, 3, '#c58bff', 2);
      } else { /* gravity pulse */
        spawnRing(bo.x,bo.y,18,bo.r+5,bo.r+30,'rgba(197,139,255,0.4)',4);
      }
    }
    if(bo.windup===0) tyrantFire(L,p,bo);
  } else if(bo.atkT>=period){ bo.atkT=0; bo.windup=CFG.TYRANT_WINDUP;
    // تسلسل الهجمات: طور1 [موجّهة، مطر] · طور2 يضيف [نبضة جاذبية]
    const kinds = bo.phase===2 ? [0,1,2,0,1] : [0,1];
    bo.atkKind = kinds[(bo.atkStep=(bo.atkStep||0)+1) % kinds.length];
  }
}
function tyrantFire(L,p,bo){
  const T=CFG.TILE, pcx=p.x+CFG.PSIZE/2, pcy=p.y+CFG.PSIZE/2;
  const sp=CFG.TTBULLET_SPEED;
  if(bo.atkKind===0){ // رشقة موجّهة نحو اللاعب (مروحة)
    const a0=Math.atan2(pcy-bo.y, pcx-bo.x); const n=bo.phase===2?5:3, spread=0.26;
    for(let i=0;i<n;i++){ const a=a0+(i-(n-1)/2)*spread;
      G.ebullets.push({x:bo.x,y:bo.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:CFG.EBULLET_LIFE}); }
    Snd.hit();
  } else if(bo.atkKind===1){ // مطر رصاص من السقف عبر الأعمدة
    const n=bo.phase===2?12:8, span=L.w-2*T;
    for(let i=0;i<n;i++){ const x=T + ((i*span/n) + (bo.atkT*17)%(span/n));
      G.ebullets.push({x, y:T+4, vx:0, vy:sp*0.9, life:CFG.EBULLET_LIFE}); }
    Snd.hit();
  } else { // نبضة جاذبية: تقلب جاذبية اللاعب + حلقة رصاص صغيرة (ميكانيكا مختلفة تماماً)
    doFlip();
    const n=6; for(let i=0;i<n;i++){ const a=i/n*Math.PI*2;
      G.ebullets.push({x:bo.x,y:bo.y,vx:Math.cos(a)*sp*0.8,vy:Math.sin(a)*sp*0.8,life:CFG.EBULLET_LIFE}); }
    Snd.trip();
  }
}
function updateEbullets(L,p){
  const T=CFG.TILE, pcx=p.x+CFG.PSIZE/2, pcy=p.y+CFG.PSIZE/2;
  for(let i=G.ebullets.length-1;i>=0;i--){
    const b=G.ebullets[i]; b.x+=b.vx; b.y+=b.vy; b.life--;
    let dead=b.life<=0;
    if(!dead){ const c=Math.floor(b.x/T), r=Math.floor(b.y/T); if(isSolid(L,r,c)) dead=true; }
    if(!dead){ const dx=b.x-pcx, dy=b.y-pcy;
      if(dx*dx+dy*dy < (CFG.EBULLET_R+CFG.PSIZE/2*0.7)*(CFG.EBULLET_R+CFG.PSIZE/2*0.7)){ killPlayer(); dead=true; } }
    if(dead) G.ebullets.splice(i,1);
  }
}

/* ————————————————— حلقة اللعب ————————————————— */
function updatePlay(){
  const p=G.player, L=G.level, T=CFG.TILE, S=CFG.PSIZE;
  G.time++; G.tick++;
  p.idleBob += 0.06 + (Math.abs(p.vx)>0.5?0.08:0);
  if(p.flipCD>0) p.flipCD--;
  if(p.fireCD>0) p.fireCD--;
  if(G.msgT>0) G.msgT--;

  // تحديث زاوية التصويب من الماوس (أو تصويب آلي للاختبار)
  updateAim();

  updatePlatforms(L);
  const ride=p.ride; if(ride){ p.x+=ride.dx; p.y+=ride.dy; }

  const dir=(KEYS.right?1:0)-(KEYS.left?1:0);
  if(dir!==0){ p.vx+=dir*CFG.RUN_ACC; p.vx=Math.max(-CFG.RUN_MAX,Math.min(CFG.RUN_MAX,p.vx)); p.facing=dir; }
  else { p.vx*=p.grounded?CFG.FRIC_GROUND:CFG.FRIC_AIR; if(Math.abs(p.vx)<0.1)p.vx=0; }

  p.vy+=CFG.GRAV*G.gravDir; p.vy=Math.max(-CFG.MAX_FALL,Math.min(CFG.MAX_FALL,p.vy));

  p.x+=p.vx; collideAxis(p,L,'x'); collidePlatformsX(p,L);
  const wasGrounded=p.grounded;
  p.y+=p.vy;
  const hitYg=collideAxis(p,L,'y');
  p.ride=null;
  const hitYp=collidePlatformsY(p,L);
  const hitY = hitYp!==0?hitYp:hitYg;
  p.grounded=(hitY!==0&&hitY===G.gravDir);

  if(p.grounded){ p.coyote=CFG.COYOTE;
    if(!wasGrounded&&p.airT>6){ p.squash=1; Snd.land(); spawnBurst(p.x+S/2,p.y+(G.gravDir>0?S:0),6,'#8aa7c7',2);
      spawnRing(p.x+S/2,p.y+(G.gravDir>0?S:0),8,4,35,'rgba(138,167,199,0.4)',2); }
    p.airT=0; triggerCrumbleUnder(p,L);
  } else { if(p.coyote>0)p.coyote--; p.airT++; }
  updateCrumble(p,L);
  if(p.grounded) p.canDash=true;
  if(p.shield>0) p.shield--;
  if(p.rapid>0) p.rapid--;
  if(p.dashCD>0) p.dashCD--;
  if(p.dash>0) p.dash--;
  // Heat system
  if(p.overheated){ p.overheatCD--; if(p.overheatCD<=0){ p.overheated=false; p.heat=0; } }
  else if(p.heat>0 && p.fireCD>0) p.heat = Math.max(0, p.heat - CFG.HEAT_DECAY);

  if(KEYS.flipPressed){ KEYS.flipPressed=false;
    if(p.grounded||p.coyote>0) doFlip(); else p.buffer=CFG.BUFFER;
  } else if(p.buffer>0){ p.buffer--; if(p.grounded) doFlip(); }

  // Dash هوائي (Shift)
  if(KEYS.dashPressed){ KEYS.dashPressed=false;
    if(!p.grounded && p.canDash && p.dashCD<=0 && p.dash<=0){
      p.canDash=false; p.dash=CFG.DASH_DUR; p.dashCD=CFG.DASH_CD;
      const dd = dir!==0 ? dir : p.facing;
      p.vx = dd*CFG.DASH_SPD; p.vy = 0;
      const cx=p.x+S/2, cy=p.y+S/2;
      spawnBurst(cx, cy, 14, '#aae0ff', 6,{col2:'#ffffff'});
      spawnRing(cx, cy, 12, 4, 50, 'rgba(170,224,255,0.4)', 3);
      Snd.dash();
    }
  }

  // إطلاق (من الماوس أو الآلي)
  if(KEYS.firePressed){ KEYS.firePressed=false; tryShoot(); }
  if(G.debug.autoAim) botCombat();

  if(p.rotT<1) p.rotT=Math.min(1,p.rotT+1/11);
  if(p.squash>0) p.squash=Math.max(0,p.squash-0.12);
  G.gravBlend += ((G.gravDir<0?1:0)-G.gravBlend)*0.08;

  if(p.y<-60||p.y>L.h+60){ killPlayer(); return; }

  // أسلاك
  for(const tw of L.trips){ if(aabb(p.x,p.y,S,S,tw.c*T+4,tw.r*T,T-8,T)){
    if(p.flipCD<=0){ doFlip(); p.flipCD=CFG.TRIP_COOLDOWN; Snd.trip(); } break; } }

  // شوك
  const px0=p.x+3,px1=p.x+S-3,py0=p.y+3,py1=p.y+S-3;
  for(const s of L.spikes){ const x=s.c*T,y=s.r*T; let hx0,hx1,hy0,hy1;
    if(s.type==='up'){hx0=x+9;hx1=x+27;hy0=y+20;hy1=y+36;}
    else if(s.type==='down'){hx0=x+9;hx1=x+27;hy0=y;hy1=y+16;}
    else if(s.type==='right'){hx0=x;hx1=x+16;hy0=y+9;hy1=y+27;}
    else {hx0=x+20;hx1=x+36;hy0=y+9;hy1=y+27;}
    if(px1>hx0&&px0<hx1&&py1>hy0&&py0<hy1){ killPlayer(); return; }
  }

  updateBullets(L);
  if(updateEnemies(L,px0,px1,py0,py1)) return;
  updateEbullets(L,p); if(G.state!=='play') return;
  if(G.boss){ updateBoss(L,p); if(G.state!=='play') return; }
  updatePowerups();

  // بوابة الخروج مفتوحة؟
  // Secrets
  for(const s of L.secrets){ if(s.found) continue;
    const dx=(p.x+S/2)-s.x, dy=(p.y+S/2)-s.y;
    if(dx*dx+dy*dy < 30*30){ s.found=true; Snd.checkpoint(); spawnBurst(s.x,s.y,16,'#ffd94d',4);
      G.player.killStreak = Math.min(8, G.player.killStreak+2); G.flashT=15; } }

  if(G.debug.autoGate) G.gateOpen = true;
  else if(!G.level.boss) G.gateOpen = liveEnemies()===0;

  // checkpoints
  for(const cp of L.checkpoints){ const cx=cp.c*T,cy=cp.r*T;
    if(p.x+S>cx&&p.x<cx+T&&p.y+S>cy&&p.y<cy+T){ if(!cp.active){ cp.active=true;
      G.checkpoint={ x:cx+T/2-S/2, y:cy+(G.gravDir>0?T-S:0), grav:G.gravDir }; Snd.checkpoint();
      spawnBurst(cx+T/2,cy+T/2,8,'#4dffa6',2.5); } } }

  // النجمة — فقط لو البوابة مفتوحة
  const st=L.star;
  if(st && G.gateOpen){ const dx=(p.x+S/2)-st.x, dy=(p.y+S/2)-st.y;
    if(dx*dx+dy*dy < CFG.STAR_R*CFG.STAR_R*2.4){
      // save best time
      if(!G.bestTimes[G.lvl]||G.time<G.bestTimes[G.lvl]){ G.bestTimes[G.lvl]=G.time; saveSettings(); }
      G.state='levelend'; G.stateT=0; Snd.winLevel(); spawnBurst(st.x,st.y,26,'#ffd94d',4.5); } }

  const target=Math.max(0,Math.min(p.x-CFG.W/2+S/2, L.w-CFG.W));
  G.camX += (target-G.camX)*0.15;
}

function update(){
  if(G.shake>0) G.shake-=1;
  if(G.flashT>0) G.flashT--;
  updateParticles();
  updateTrailsAndRings();
  // Screen transition
  if(G.transition.dir===1){ G.transition.alpha = Math.min(1, G.transition.alpha + 0.05); if(G.transition.alpha>=1){ const cb=G.transition.cb; G.transition.dir=-1; if(cb) cb(); } }
  else if(G.transition.dir===-1){ G.transition.alpha = Math.max(0, G.transition.alpha - 0.05); if(G.transition.alpha<=0) G.transition.dir=0; }
  if(G.hitstop>0){ G.hitstop--; return; }
  switch(G.state){
    case 'play': updatePlay(); break;
    case 'dead': G.stateT++; if(G.stateT>=20){ G.state='deathscreen'; G.stateT=0; } break;
    case 'levelend': G.stateT++; if(G.stateT>=35){
      const storyAfter = [2,5];
      if(storyAfter.includes(G.lvl) && G.lvl+1<LEVELS.length){ G.state='story'; G.storyIdx=storyAfter.indexOf(G.lvl); G.stateT=0; }
      else { G.state='levelcomplete'; G.stateT=0; }
    } break;
    case 'story': break;
  }
}
function startGame(){ G.deaths=0; G.time=0; G.player.totalKills=0; loadLevel(0); }

/* ————————————————— تصويب: ماوس أو آلي ————————————————— */
function updateAim(){
  const p=G.player, cx=p.x+CFG.PSIZE/2, cy=p.y+CFG.PSIZE/2;
  if(G.debug.autoAim){
    const t=nearestLiveTarget();
    if(t) p.aim=Math.atan2(t.y-cy, t.x-cx);
    return;
  }
  // إحداثيات الماوس في عالم اللعبة (بعد الكاميرا)
  const wx=mouse.x+Math.round(G.camX), wy=mouse.y;
  p.aim=Math.atan2(wy-cy, wx-cx);
}
function nearestLiveTarget(){
  const p=G.player, cx=p.x+CFG.PSIZE/2, cy=p.y+CFG.PSIZE/2;
  let best=null, bd=1e9;
  if(G.boss&&G.boss.alive){ best={x:G.boss.x,y:G.boss.y}; bd=(G.boss.x-cx)**2+(G.boss.y-cy)**2; }
  for(const e of G.level.enemies){ if(!e.alive) continue; const d=(e.x-cx)**2+(e.y-cy)**2; if(d<bd){bd=d;best={x:e.x,y:e.y};} }
  return best;
}
// ذكاء قتال للبوت: صوّب على الأقرب واطلق لو فيه خط رؤية
function botCombat(){
  const p=G.player; if(p.fireCD>0||p.overheated) return;
  const t=nearestLiveTarget(); if(!t) return;
  const cx=p.x+CFG.PSIZE/2, cy=p.y+CFG.PSIZE/2;
  if(!lineClear(cx,cy,t.x,t.y)) return;
  const d2=(t.x-cx)**2+(t.y-cy)**2; if(d2>440*440) return;
  tryShoot();
}
function lineClear(x0,y0,x1,y1){
  const T=CFG.TILE, steps=Math.ceil(Math.hypot(x1-x0,y1-y0)/8);
  for(let i=1;i<steps;i++){ const t=i/steps, x=x0+(x1-x0)*t, y=y0+(y1-y0)*t;
    if(isSolid(G.level,Math.floor(y/T),Math.floor(x/T))) return false; }
  return true;
}

/* ————————————————— Trail + Ring نظام ————————————————— */
function spawnRing(x,y,life,r0,r1,col,width){
  G.rings.push({ x, y, life, maxLife:life, r:r0, rMax:r1, col, width });
}
function updateTrailsAndRings(){
  const p = G.player, S = CFG.PSIZE;
  // Dash trail ghosts
  if (p.dash > 0) {
    G.trails.push({ x:p.x, y:p.y, life:1 });
  }
  // Decay trails
  for (let i = G.trails.length-1; i>=0; i--) {
    G.trails[i].life -= 0.045;
    if (G.trails[i].life <= 0) G.trails.splice(i,1);
  }
  // Decay rings
  for (let i = G.rings.length-1; i>=0; i--) {
    const r = G.rings[i]; r.life--;
    const t = 1 - r.life / r.maxLife;
    r.r = r.rMax * t;
    if (r.life <= 0) G.rings.splice(i,1);
  }
}

/* ————————————————— جسيمات ————————————————— */
function spawnBurst(x,y,n,col,speed,opts){
  for(let i=0;i<n;i++){ const a=Math.random()*Math.PI*2, v=(0.3+Math.random()*0.7)*speed;
    G.particles.push({ x,y, vx:Math.cos(a)*v, vy:Math.sin(a)*v, life:1, decay:0.025+Math.random()*0.025,
      col:opts&&opts.col2?((Math.random()<0.4)?opts.col2:col):col, size:(opts&&opts.size?opts.size:2)+Math.random()*3 }); }
}
function updateParticles(){
  if(G.particles.length > 400) G.particles.splice(0, G.particles.length - 300);
  for(let i=G.particles.length-1;i>=0;i--){ const p=G.particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vx*=0.96; p.vy*=0.96; p.life-=p.decay; if(p.life<=0) G.particles.splice(i,1); }
}
function spawnPowerup(x,y){
  const type = Math.random()<0.5 ? 'shield' : 'rapid';
  G.powerups.push({ x, y, type, life:CFG.POWERUP_LIFE, bob:Math.random()*6.28 });
}
function updatePowerups(){
  const p=G.player, S=CFG.PSIZE, T=CFG.TILE, L=G.level;
  for(let i=G.powerups.length-1;i>=0;i--){
    const u=G.powerups[i]; u.bob+=0.06; u.life--;
    // رسوم جاذبية بسيطة: يطفو في مكانه
    if(u.life<=0||u.y>L.h+40){ G.powerups.splice(i,1); continue; }
    // تصادم مع اللاعب
    const dx=(p.x+S/2)-u.x, dy=(p.y+S/2)-u.y;
    if(dx*dx+dy*dy < 24*24){
      if(u.type==='shield'){ p.shield=CFG.SHIELD_DUR; spawnBurst(u.x,u.y,10,'#7ac7ff',3);
        Snd.checkpoint(); }
      else { p.rapid=CFG.RAPID_DUR; spawnBurst(u.x,u.y,10,'#ffd94d',3);
        Snd.checkpoint(); }
      G.powerups.splice(i,1);
    }
  }
}

/* ————————————————— الرسم ————————————————— */
const cv=document.getElementById('game'), ctx=cv.getContext('2d');
const dpr=Math.min(window.devicePixelRatio||1,2);
if(dpr>1){ cv.width=CFG.W*dpr; cv.height=CFG.H*dpr; ctx.scale(dpr,dpr); }
const THEMES=[
  { down:{top:[11,21,38],bot:[18,35,61]}, up:{top:[25,15,43],bot:[43,23,71]},
    tileA:[53,80,122], tileB:[74,58,120], edgeA:[93,138,184], edgeB:[130,104,190], player:'#4de3ff' },
  { down:{top:[32,12,20],bot:[58,20,30]}, up:{top:[40,12,30],bot:[74,20,46]},
    tileA:[120,54,60], tileB:[120,60,96], edgeA:[196,96,104], edgeB:[196,116,158], player:'#ffe14d' },
];
const lerp=(a,b,t)=>a+(b-a)*t;
const lerpC=(c1,c2,t)=>`rgb(${c1.map((v,i)=>Math.round(lerp(v,c2[i],t))).join(',')})`;
const STARS=(()=>{ const arr=[]; let s=12345; const rnd=()=>(s=(s*1103515245+12345)&0x7fffffff)/0x7fffffff;
  for(let i=0;i<70;i++) arr.push({x:rnd()*2400,y:rnd()*540,z:0.15+rnd()*0.3,r:0.5+rnd()*1.3}); return arr; })();
let frameCount=0;

function drawSpike(s,T){ const x=s.c*T,y=s.r*T; ctx.beginPath();
  if(s.type==='up'){ctx.moveTo(x+2,y+T);ctx.lineTo(x+T/2,y+T-22);ctx.lineTo(x+T-2,y+T);}
  else if(s.type==='down'){ctx.moveTo(x+2,y);ctx.lineTo(x+T/2,y+22);ctx.lineTo(x+T-2,y);}
  else if(s.type==='right'){ctx.moveTo(x,y+2);ctx.lineTo(x+22,y+T/2);ctx.lineTo(x,y+T-2);}
  else {ctx.moveTo(x+T,y+2);ctx.lineTo(x+T-22,y+T/2);ctx.lineTo(x+T,y+T-2);} ctx.closePath(); ctx.fill(); }

function render(){
  frameCount++;
  const W=CFG.W,H=CFG.H,T=CFG.TILE;
  const th = THEMES[(G.level&&G.level.theme)||0];
  const t=G.gravBlend;
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0, lerpC(th.down.top, th.up.top, t));
  grad.addColorStop(1, lerpC(th.down.bot, th.up.bot, t));
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);

  ctx.save();
  for(const s of STARS){ const sx=((s.x-G.camX*s.z)%2400+2400)%2400-720; if(sx<-10||sx>W+10) continue;
    ctx.globalAlpha=0.25+0.2*Math.sin(frameCount*0.03+s.x); ctx.fillStyle='#cfe4ff'; ctx.fillRect(sx,s.y,s.r,s.r); }
  ctx.restore();

  // Parallax background — طبقة تضاريس خلفية
  if(G.level){
    ctx.save(); ctx.translate(-Math.round(G.camX*0.15),0);
    const pCol = G.level.theme===0 ? 'rgba(20,30,50,0.35)' : 'rgba(40,15,25,0.35)';
    const pHi = G.level.theme===0 ? 'rgba(20,35,65,0.15)' : 'rgba(55,18,30,0.15)';
    ctx.fillStyle=pCol; ctx.beginPath(); ctx.moveTo(0,450);
    for(let x=0;x<=1400;x+=40){ const y=450-Math.sin(x*0.008+1.2)*90-Math.sin(x*0.02)*30-Math.sin(x*0.005)*50; ctx.lineTo(x,Math.max(300,y)); }
    ctx.lineTo(1400,540); ctx.lineTo(0,540); ctx.closePath(); ctx.fill();
    ctx.fillStyle=pHi; ctx.beginPath(); ctx.moveTo(0,480);
    for(let x=0;x<=1400;x+=40){ const y=480-Math.sin(x*0.01+2.1)*60-Math.sin(x*0.025)*20; ctx.lineTo(x,Math.max(350,y)); }
    ctx.lineTo(1400,540); ctx.lineTo(0,540); ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  if(!G.level || G.state==='menu'||G.state==='langselect'||G.state==='won'||(G.state==='settings'&&G.settingsReturn==='menu')){
    renderUI(); return;
  }

  ctx.save();
  if(G.shake>0) ctx.translate((Math.random()-0.5)*G.shake*1.3,(Math.random()-0.5)*G.shake*1.3);
  ctx.translate(-Math.round(G.camX),0);
  const L=G.level;
  const c0=Math.max(0,Math.floor(G.camX/T)-1), c1=Math.min(L.cols-1,Math.ceil((G.camX+W)/T)+1);

  const tileBase=lerpC(th.tileA, th.tileB, t), tileEdge=lerpC(th.edgeA, th.edgeB, t);
  for(let r=0;r<L.rows;r++)for(let c=c0;c<=c1;c++){
    if(!L.solid[r][c]||L.crumbleMap[r+','+c]) continue;
    const x=c*T,y=r*T; ctx.fillStyle=tileBase; ctx.fillRect(x,y,T,T); ctx.fillStyle=tileEdge;
    if(!isSolid(L,r-1,c)) ctx.fillRect(x,y,T,3); if(!isSolid(L,r+1,c)) ctx.fillRect(x,y+T-3,T,3);
  }
  for(const o of L.crumble){ const x=o.c*T,y=o.r*T;
    if(o.state==='gone'){ ctx.globalAlpha=0.12; ctx.fillStyle='#6b5030'; ctx.fillRect(x+3,y+3,T-6,T-6); ctx.globalAlpha=1; continue; }
    let jx=0,jy=0; if(o.state==='warn'){ jx=(Math.random()-0.5)*3; jy=(Math.random()-0.5)*3; }
    ctx.fillStyle=o.state==='warn'?'#b5763a':'#8a5f34'; ctx.fillRect(x+jx,y+jy,T,T);
    ctx.strokeStyle='rgba(30,18,8,0.6)'; ctx.lineWidth=1.5; ctx.beginPath();
    ctx.moveTo(x+8+jx,y+jy);ctx.lineTo(x+14+jx,y+18+jy);ctx.lineTo(x+6+jx,y+T+jy);
    ctx.moveTo(x+24+jx,y+jy);ctx.lineTo(x+20+jx,y+16+jy);ctx.lineTo(x+28+jx,y+T+jy); ctx.stroke(); }
  for(const pl of L.platforms){
    ctx.fillStyle='#3b6ea5'; ctx.fillRect(pl.x,pl.y,pl.w,pl.h);
    ctx.fillStyle='#6fa8dc'; ctx.fillRect(pl.x,pl.y,pl.w,3); ctx.fillRect(pl.x,pl.y+pl.h-3,pl.w,3);
    ctx.fillStyle='rgba(230,240,255,0.55)'; const cxp=pl.x+pl.w/2,cyp=pl.y+pl.h/2; ctx.beginPath();
    if(pl.axis==='h'){ ctx.moveTo(cxp-10,cyp);ctx.lineTo(cxp-4,cyp-5);ctx.lineTo(cxp-4,cyp+5);
      ctx.moveTo(cxp+10,cyp);ctx.lineTo(cxp+4,cyp-5);ctx.lineTo(cxp+4,cyp+5); }
    else { ctx.moveTo(cxp,cyp-9);ctx.lineTo(cxp-5,cyp-3);ctx.lineTo(cxp+5,cyp-3);
      ctx.moveTo(cxp,cyp+9);ctx.lineTo(cxp-5,cyp+3);ctx.lineTo(cxp+5,cyp+3); } ctx.fill();
  }
  for(const tw of L.trips){ const x=tw.c*T,y=tw.r*T,cy=y+T/2;
    ctx.strokeStyle='#c58bff'; ctx.globalAlpha=0.5+0.4*Math.sin(frameCount*0.15+tw.c); ctx.lineWidth=2.5;
    ctx.setLineDash([6,5]); ctx.beginPath(); ctx.moveTo(x,cy); ctx.lineTo(x+T,cy); ctx.stroke(); ctx.setLineDash([]); ctx.globalAlpha=1;
    ctx.fillStyle='rgba(197,139,255,0.9)'; ctx.beginPath();
    ctx.moveTo(x+T/2,y+6);ctx.lineTo(x+T/2-4,y+12);ctx.lineTo(x+T/2+4,y+12);
    ctx.moveTo(x+T/2,y+T-6);ctx.lineTo(x+T/2-4,y+T-12);ctx.lineTo(x+T/2+4,y+T-12); ctx.fill(); }
  ctx.fillStyle='#ff5566'; for(const s of L.spikes) drawSpike(s,T);

  for(const cp of L.checkpoints){ const x=cp.c*T,y=cp.r*T;
    const onCeil=isSolid(L,cp.r-1,cp.c)&&!isSolid(L,cp.r+1,cp.c); ctx.fillStyle=cp.active?'#4dffa6':'#5a6f8a';
    if(onCeil){ ctx.fillRect(x+13,y,4,26); ctx.beginPath(); ctx.moveTo(x+17,y+26);ctx.lineTo(x+29,y+20);ctx.lineTo(x+17,y+14); ctx.closePath(); ctx.fill(); }
    else { ctx.fillRect(x+13,y+T-26,4,26); ctx.beginPath(); ctx.moveTo(x+17,y+T-26);ctx.lineTo(x+29,y+T-20);ctx.lineTo(x+17,y+T-14); ctx.closePath(); ctx.fill(); }
    if(cp.active){ ctx.globalAlpha=0.25+0.15*Math.sin(frameCount*0.1); ctx.beginPath(); ctx.arc(x+T/2,y+T/2,16,0,7); ctx.fill(); ctx.globalAlpha=1; } }

  // أعداء أحياء
  for(const e of L.enemies){ if(!e.alive) continue;
    const isShooter=e.axis==='s', vertical=e.axis==='v', isCharger=e.axis==='c';
    const pr=isShooter||isCharger?CFG.SHOOTER_R:(CFG.ENEMY_R+Math.sin((frameCount+e.phase)*0.12)*1.5);
    const pcx=G.player.x+CFG.PSIZE/2, pcy=G.player.y+CFG.PSIZE/2;
    // وهج خلف العدو
    ctx.globalAlpha=0.12+0.06*Math.sin(frameCount*0.08+e.phase);
    const glowCol=isShooter?'#c58bff':(isCharger?'#ff6644':(vertical?'#c774ff':'#ff9f43'));
    ctx.fillStyle=glowCol; ctx.beginPath(); ctx.arc(e.x,e.y,pr+8,0,7); ctx.fill(); ctx.globalAlpha=1;
    if(isShooter){
      const sa=Math.atan2(pcy-e.y, pcx-e.x);
      ctx.save(); ctx.translate(e.x,e.y); ctx.rotate(sa);
      ctx.fillStyle='#2a1040'; ctx.fillRect(8,-3,16,6); ctx.fillStyle='#c58bff'; ctx.fillRect(20,-3,4,6);
      ctx.restore();
      ctx.fillStyle='#6b2fa0'; ctx.save(); ctx.translate(e.x,e.y); ctx.rotate(frameCount*0.04+sa);
      ctx.beginPath(); ctx.moveTo(pr,0); ctx.lineTo(0,-pr); ctx.lineTo(-pr,0); ctx.lineTo(0,pr); ctx.closePath(); ctx.fill();
      ctx.restore();
      // حواف مضيئة للمعين
      ctx.strokeStyle='rgba(197,139,255,0.4)'; ctx.lineWidth=1.5; ctx.save(); ctx.translate(e.x,e.y); ctx.rotate(frameCount*0.05+sa);
      ctx.beginPath(); ctx.moveTo(pr+2,0); ctx.lineTo(0,-pr-2); ctx.lineTo(-pr-2,0); ctx.lineTo(0,pr+2); ctx.closePath(); ctx.stroke();
      ctx.restore();
      const sae = Math.atan2(pcy-e.y, pcx-e.x);
      ctx.fillStyle='#1a0a2e'; ctx.beginPath(); ctx.arc(e.x+Math.cos(sae)*5, e.y+Math.sin(sae)*5, pr*0.28, 0, 7); ctx.fill();
      ctx.fillStyle='#ff77dd'; ctx.beginPath(); ctx.arc(e.x+Math.cos(sae)*7, e.y+Math.sin(sae)*7, pr*0.1, 0, 7); ctx.fill();
    } else if(isCharger){
      // Charger: مثلث أحمر — يندفع ناحية اللاعب
      const ca = e._charging ? Math.atan2(e._cvy, e._cvx) : Math.atan2(pcy-e.y, pcx-e.x);
      ctx.save(); ctx.translate(e.x,e.y); ctx.rotate(ca);
      ctx.fillStyle=e._charging?'#ff4455':'#cc5533';
      ctx.beginPath(); ctx.moveTo(pr+3,0); ctx.lineTo(-pr+3,-pr+2); ctx.lineTo(-pr+3,pr+2); ctx.closePath(); ctx.fill();
      ctx.strokeStyle='rgba(255,68,85,0.4)'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(pr+5,0); ctx.lineTo(-pr+5,-pr-2); ctx.lineTo(-pr+5,pr+2); ctx.closePath(); ctx.stroke();
      ctx.restore();
      // HP bar
      const bw=18,bh=3; ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(e.x-bw/2,e.y-pr-8,bw,bh);
      ctx.fillStyle='#ff6644'; ctx.fillRect(e.x-bw/2,e.y-pr-8,bw*(e.hp/2),bh);
    } else {
      ctx.fillStyle=vertical?'#c774ff':'#ff9f43'; ctx.beginPath(); ctx.arc(e.x,e.y,pr,0,7); ctx.fill();
      // HP bar للشوتير (2HP)
      if(e.axis==='s'){ const bw=20,bh=3; ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(e.x-bw/2,e.y-pr-8,bw,bh);
        ctx.fillStyle='#ff77dd'; ctx.fillRect(e.x-bw/2,e.y-pr-8,bw*(e.hp/2),bh); }
      // شريط خارجي/طوق
      ctx.strokeStyle=vertical?'rgba(199,116,255,0.3)':'rgba(255,159,67,0.3)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(e.x,e.y,pr+3,0,7); ctx.stroke();
      const ea = Math.atan2(pcy-e.y, pcx-e.x);
      const ed = Math.min(pr*0.35, 5);
      const eox = Math.cos(ea)*ed, eoy = Math.sin(ea)*ed;
      ctx.fillStyle=vertical?'#7a2fb0':'#b3541e';
      ctx.beginPath(); ctx.arc(e.x+eox, e.y+eoy, pr*0.35, 0, 7); ctx.fill();
      // بؤبؤ صغير
      ctx.fillStyle='#1a0505';
      ctx.beginPath(); ctx.arc(e.x+Math.cos(ea)*(ed+3), e.y+Math.sin(ea)*(ed+3), pr*0.12, 0, 7); ctx.fill();
    }
  }

  // طلقات العدو — heart-shaped core + trail glow
  for(const b of G.ebullets){
    const col = b._purple?'#c58bff':'#ff884d';
    // Trail
    ctx.globalAlpha=0.2; ctx.fillStyle=col;
    ctx.beginPath(); ctx.arc(b.x-b.vx*0.5, b.y-b.vy*0.5, CFG.EBULLET_R*0.8, 0, 7); ctx.fill();
    ctx.globalAlpha=0.4; ctx.beginPath(); ctx.arc(b.x-b.vx*0.3, b.y-b.vy*0.3, CFG.EBULLET_R*1.2, 0, 7); ctx.fill();
    ctx.globalAlpha=1;
    // Core
    ctx.fillStyle=col; ctx.beginPath(); ctx.arc(b.x,b.y,CFG.EBULLET_R,0,7); ctx.fill(); }

  // Power-ups
  for(const u of G.powerups){
    const by = u.y + Math.sin(u.bob)*3;
    ctx.globalAlpha = Math.min(1, u.life/80);
    if(u.type==='shield'){
      ctx.fillStyle='#7ac7ff'; ctx.save(); ctx.translate(u.x,by); ctx.rotate(frameCount*0.05);
      ctx.beginPath(); ctx.moveTo(0,-10); ctx.lineTo(10,0); ctx.lineTo(0,10); ctx.lineTo(-10,0); ctx.closePath(); ctx.fill();
      ctx.strokeStyle='#cfe4ff'; ctx.lineWidth=2; ctx.strokeRect(-12,-12,24,24);
      ctx.restore();
    } else {
      ctx.fillStyle='#ffd94d'; ctx.save(); ctx.translate(u.x,by); ctx.rotate(frameCount*0.04);
      ctx.beginPath(); ctx.moveTo(0,-10); ctx.lineTo(4,-4); ctx.lineTo(10,-2); ctx.lineTo(5,2); ctx.lineTo(7,10);
      ctx.lineTo(0,5); ctx.lineTo(-7,10); ctx.lineTo(-5,2); ctx.lineTo(-10,-2); ctx.lineTo(-4,-4); ctx.closePath(); ctx.fill();
      ctx.restore();
    }
    ctx.globalAlpha = 1;
  }

  // الزعيم
  if(G.boss&&G.boss.alive) drawBoss(G.boss);

  // النجمة (تُرسم مُقفلة حتى تُفتح البوابة)
  if(L.star){ const st=L.star, rot=frameCount*0.02, open=G.gateOpen;
    const pulse=1+0.08*Math.sin(frameCount*0.08); ctx.save(); ctx.translate(st.x,st.y); ctx.rotate(rot); ctx.scale(pulse,pulse);
    ctx.globalAlpha=open?0.2:0.06; ctx.fillStyle=open?'#ffd94d':'#68708a'; ctx.beginPath(); ctx.arc(0,0,26,0,7); ctx.fill(); ctx.globalAlpha=1;
    ctx.fillStyle=open?'#ffd94d':'#6b7590'; ctx.beginPath();
    for(let i=0;i<10;i++){ const rr=i%2===0?15:6.5, a=i*Math.PI/5-Math.PI/2; ctx[i===0?'moveTo':'lineTo'](Math.cos(a)*rr,Math.sin(a)*rr); }
    ctx.closePath(); ctx.fill();
    if(!open){ ctx.rotate(-rot); ctx.strokeStyle='#39405a'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(0,3,5,Math.PI,0); ctx.stroke(); ctx.fillRect(-6,3,12,9); }
    ctx.restore(); }

  // طلقات اللاعب
  for(const b of G.bullets){ ctx.strokeStyle='#ffe08a'; ctx.lineWidth=3; ctx.beginPath();
    ctx.moveTo(b.x,b.y); ctx.lineTo(b.x-b.vx*1.2,b.y-b.vy*1.2); ctx.stroke();
    ctx.fillStyle='#fff2c2'; ctx.beginPath(); ctx.arc(b.x,b.y,CFG.BULLET_R,0,7); ctx.fill(); }

  for(const p of G.particles){ ctx.globalAlpha=Math.max(0,p.life); ctx.fillStyle=p.col; ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size); }
  ctx.globalAlpha=1;

  // حلقات الصدمة (expanding rings)
  for(const r of G.rings){
    const t = 1 - r.life / r.maxLife;
    ctx.globalAlpha = 1 - t;
    ctx.strokeStyle = r.col; ctx.lineWidth = r.width * (1 - t);
    ctx.beginPath(); ctx.arc(r.x, r.y, r.r, 0, 7); ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // أثر الـ dash: ghosts متعددة
  for(const tr of G.trails){
    const p = G.player, S = CFG.PSIZE;
    ctx.globalAlpha = tr.life * 0.25;
    ctx.fillStyle = '#aae0ff';
    ctx.fillRect(tr.x, tr.y, S, S);
  }
  ctx.globalAlpha = 1;

  // Glow pass (additive blending للعناصر المضيئة)
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  // Glow للرصاصات
  for(const b of G.bullets){
    ctx.fillStyle = 'rgba(255,224,138,0.25)';
    ctx.beginPath(); ctx.arc(b.x, b.y, CFG.BULLET_R * 4, 0, 7); ctx.fill();
  }
  // Glow لرصاص الأعداء
  for(const b of G.ebullets){
    ctx.fillStyle = b._purple ? 'rgba(197,139,255,0.25)' : 'rgba(255,136,77,0.25)';
    ctx.beginPath(); ctx.arc(b.x, b.y, CFG.EBULLET_R * 3, 0, 7); ctx.fill();
  }
  // Glow للاعب أثناء الاندفاع
  if(G.player.dash>0){ const p=G.player, S=CFG.PSIZE, cx2=p.x+S/2, cy2=p.y+S/2;
    ctx.fillStyle = 'rgba(170,224,255,0.15)';
    ctx.beginPath(); ctx.arc(cx2, cy2, S*1.2, 0, 7); ctx.fill(); }
  // Glow للأسرار
  for(const s of L.secrets){ if(s.found) continue;
    const dx=(G.player.x+CFG.PSIZE/2)-s.x, dy=(G.player.y+CFG.PSIZE/2)-s.y;
    if(dx*dx+dy*dy < 160*160){
      ctx.fillStyle = 'rgba(255,217,77,0.08)';
      ctx.beginPath(); ctx.arc(s.x, s.y, 18 + 4*Math.sin(frameCount*0.08), 0, 7); ctx.fill(); } }
  // Glow للنجمة
  if(L.star && G.gateOpen){ const st=L.star;
    ctx.fillStyle = 'rgba(255,217,77,0.15)';
    ctx.beginPath(); ctx.arc(st.x, st.y, 36, 0, 7); ctx.fill(); }
  ctx.restore();

  // اللاعب + المسدس
  if(G.state!=='dead'){ const p=G.player, S=CFG.PSIZE;
    const rot=(1-p.rotT)*Math.PI*p.facing, sq=1-p.squash*0.3;
    const idleY = Math.sin(p.idleBob)*1.2;
    const cx=p.x+S/2, cy=p.y+S/2+idleY;
    const headDir = G.gravDir>0 ? -1 : 1;  // الرأس ناحية الجاذبية المعاكسة
    const kick = p.fireCD > 6 ? (p.fireCD - 6)*0.7 : 0;
    // مسدس
    ctx.save(); ctx.translate(cx,cy); ctx.rotate(p.aim);
    ctx.fillStyle='#0b2a3a'; ctx.fillRect(6-kick,-3.5,18,7);
    ctx.fillStyle='#cfe4ff'; ctx.fillRect(20-kick,-3.5,4,7); ctx.restore();
    // الجسم بالكامل مع flip/squash
    ctx.save(); ctx.translate(cx,cy); ctx.rotate(rot); ctx.scale(1/sq*(p.squash>0?1.15:1),sq);
    // بدلة (جسم) — لون يتغير حسب killStreak
    const ks = Math.min(p.killStreak, 8) / 8;
    const pCol = ks > 0 ? `rgb(${Math.round(lerp(77,255,ks))},${Math.round(lerp(227,217,ks))},${Math.round(lerp(255,77,ks))})` : th.player;
    ctx.fillStyle=pCol; ctx.fillRect(-S/2,-S/2,S,S);
    // إطار خوذة — شريط داكن في منطقة الرأس
    ctx.fillStyle='rgba(0,0,0,0.15)';
    const headH = 10;
    if(headDir<0) ctx.fillRect(-S/2, -S/2, S, headH);
    else ctx.fillRect(-S/2, S/2-headH, S, headH);
    // أحذية — زوايا سفلية داكنة
    ctx.fillStyle='rgba(0,0,0,0.25)'; const bSize=5;
    if(headDir<0){
      ctx.fillRect(-S/2, S/2-bSize, bSize, bSize);
      ctx.fillRect(S/2-bSize, S/2-bSize, bSize, bSize);
    } else {
      ctx.fillRect(-S/2, -S/2, bSize, bSize);
      ctx.fillRect(S/2-bSize, -S/2, bSize, bSize);
    }
    // عيون — visor متوهج
    const ey = G.gravDir>0 ? -5 : 5;
    const eGlow = 0.2+0.1*Math.sin(p.idleBob);
    // وهج خلف العيون
    ctx.fillStyle=`rgba(255,255,255,${eGlow})`;
    ctx.fillRect(p.facing*4-4, ey-2, 10, 5);
    // بياض العين
    ctx.fillStyle='#eaf3ff';
    ctx.fillRect(p.facing*4-2, ey-1, 3.5, 3);
    ctx.fillRect(p.facing*10-2, ey-1, 3.5, 3);
    // وهج العيون من killStreak
    if(ks>0.3){ ctx.globalAlpha=ks*0.3; ctx.fillStyle='#ffd94d';
      ctx.fillRect(p.facing*4-4, ey-2, 10, 5); ctx.globalAlpha=1; }
    // بؤبؤ (يتجه ناحية aim)
    const pa = Math.atan2(Math.sin(p.aim), Math.cos(p.aim)*p.facing);
    ctx.fillStyle='#0b2a3a';
    const px = Math.cos(pa)*1.2, py = Math.sin(pa)*0.8;
    ctx.fillRect(p.facing*4-1+px, ey-0.5+py, 2, 2);
    ctx.fillRect(p.facing*10-1+px, ey-0.5+py, 2, 2);
    ctx.restore();
  }
  ctx.restore(); // كاميرا

  // Red vignette عند الضرر
  if(G.dmgFlash>0){ G.dmgFlash--;
    const vg = ctx.createRadialGradient(CFG.W/2,CFG.H/2,CFG.H*0.2,CFG.W/2,CFG.H/2,CFG.H*0.7);
    vg.addColorStop(0,'rgba(0,0,0,0)');
    vg.addColorStop(1,`rgba(255,50,50,${G.dmgFlash/40})`);
    ctx.fillStyle=vg; ctx.fillRect(0,0,CFG.W,CFG.H);
  }

  // crosshair عند الماوس (إحداثيات الشاشة)
  if(G.state==='play'){ ctx.strokeStyle='rgba(255,240,180,0.9)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(mouse.x,mouse.y,7,0,7); ctx.moveTo(mouse.x-11,mouse.y);ctx.lineTo(mouse.x-3,mouse.y);
    ctx.moveTo(mouse.x+3,mouse.y);ctx.lineTo(mouse.x+11,mouse.y); ctx.moveTo(mouse.x,mouse.y-11);ctx.lineTo(mouse.x,mouse.y-3);
    ctx.moveTo(mouse.x,mouse.y+3);ctx.lineTo(mouse.x,mouse.y+11); ctx.stroke(); }

  renderHUD();
  renderUI();

  // Screen transition overlay
  if(G.transition.alpha > 0){
    ctx.save();
    ctx.globalAlpha = G.transition.alpha * 0.6;
    ctx.fillStyle = '#060a12';
    ctx.fillRect(0, 0, CFG.W, CFG.H);
    ctx.restore();
  }
}

function drawBoss(bo){
  if(bo.type==='tyrant') return drawTyrant(bo);
  const flash = bo.hitFlash>0, warn = bo.windup>0;
  ctx.save(); ctx.translate(bo.x,bo.y);
  // هالة خارجية متوهجة
  const gl = warn ? (0.4+0.4*Math.sin(frameCount*0.6)) : 0.2;
  ctx.globalAlpha=gl; ctx.fillStyle= warn?'#ff5566':'#ff9f43'; ctx.beginPath(); ctx.arc(0,0,bo.r+12,0,7); ctx.fill(); ctx.globalAlpha=1;
  // حلقة طاقة (طور 2)
  if(bo.phase===2){ ctx.strokeStyle='rgba(255,95,109,0.5)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(0,0,bo.r+6+2*Math.sin(frameCount*0.1),0,7); ctx.stroke(); }
  // الجسم الرئيسي
  ctx.fillStyle= flash?'#ffffff' : (bo.phase===2?'#ff5f6d':'#e0673a'); ctx.beginPath(); ctx.arc(0,0,bo.r,0,7); ctx.fill();
  // نواة
  ctx.fillStyle='#2a0d0d'; ctx.beginPath(); ctx.arc(0,0,bo.r*0.5,0,7); ctx.fill();
  // حلقة داخلية حول العين
  ctx.strokeStyle='rgba(42,13,13,0.5)'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(0,0,bo.r*0.28,0,7); ctx.stroke();
  // وهج العين
  ctx.fillStyle= warn?'#ffe14d':'#ffb0b0'; ctx.beginPath(); ctx.arc(0,0,bo.r*0.22,0,7); ctx.fill();
  // بؤبؤ يتابع اللاعب
  const ba = Math.atan2(G.player.y+CFG.PSIZE/2-bo.y, G.player.x+CFG.PSIZE/2-bo.x);
  ctx.fillStyle='#1a0505'; ctx.beginPath(); ctx.arc(Math.cos(ba)*bo.r*0.2, Math.sin(ba)*bo.r*0.2, bo.r*0.1, 0, 7); ctx.fill();
  // بصيص ضوء صغير في العين
  ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.beginPath(); ctx.arc(Math.cos(ba+0.5)*bo.r*0.16, Math.sin(ba+0.5)*bo.r*0.16, bo.r*0.04, 0, 7); ctx.fill();
  ctx.restore();
}
// الطاغية: نجمة/ماسة شائكة بنفسجية دوّارة بعين — شكل مختلف تماماً عن الحارس
function drawTyrant(bo){
  const flash=bo.hitFlash>0, warn=bo.windup>0;
  const warnCol = bo.atkKind===2 ? '#c58bff' : '#ff77dd';
  ctx.save(); ctx.translate(bo.x,bo.y);
  // هالة خارجية متوهجة
  const gl = warn ? (0.35+0.45*Math.sin(frameCount*0.7)) : 0.18;
  ctx.globalAlpha=gl; ctx.fillStyle=warn?warnCol:'#8a4dff'; ctx.beginPath(); ctx.arc(0,0,bo.r+16,0,7); ctx.fill(); ctx.globalAlpha=1;
  // حلقة طاقة (طور 2)
  if(bo.phase===2){ ctx.strokeStyle='rgba(179,77,255,0.4)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(0,0,bo.r+8+3*Math.sin(frameCount*0.12),0,7); ctx.stroke(); }
  // جسم نجمي دوّار بأشواك
  ctx.rotate(bo.spin);
  const spikes=8, rOut=bo.r, rIn=bo.r*0.6;
  ctx.beginPath();
  for(let i=0;i<spikes*2;i++){ const rr=i%2===0?rOut:rIn, a=i*Math.PI/spikes; ctx[i===0?'moveTo':'lineTo'](Math.cos(a)*rr,Math.sin(a)*rr); }
  ctx.closePath();
  ctx.fillStyle= flash?'#ffffff' : (bo.phase===2?'#b34dff':'#7a3ad6'); ctx.fill();
  // حواف مضيئة للأشواك
  ctx.strokeStyle= flash?'rgba(255,255,255,0.6)':'rgba(200,150,255,0.2)'; ctx.lineWidth=1.5;
  ctx.beginPath();
  for(let i=0;i<spikes*2;i++){ const rr=i%2===0?rOut+2:rIn-2, a=i*Math.PI/spikes; ctx[i===0?'moveTo':'lineTo'](Math.cos(a)*rr,Math.sin(a)*rr); }
  ctx.stroke();
  ctx.rotate(-bo.spin);
  // نواة
  ctx.fillStyle='#1a0a2e'; ctx.beginPath(); ctx.arc(0,0,bo.r*0.5,0,7); ctx.fill();
  ctx.strokeStyle='rgba(26,10,46,0.6)'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(0,0,bo.r*0.3,0,7); ctx.stroke();
  // وهج العين
  ctx.fillStyle= warn?'#ffe14d':'#e0b0ff'; ctx.beginPath(); ctx.arc(0,0,bo.r*0.24,0,7); ctx.fill();
  // بؤبؤ يتابع اللاعب
  const ta = Math.atan2(G.player.y+CFG.PSIZE/2-bo.y, G.player.x+CFG.PSIZE/2-bo.x);
  ctx.fillStyle='#0a0520'; ctx.beginPath(); ctx.arc(Math.cos(ta)*bo.r*0.18, Math.sin(ta)*bo.r*0.18, bo.r*0.09, 0, 7); ctx.fill();
  // بصيص ضوء
  ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.beginPath(); ctx.arc(Math.cos(ta+0.6)*bo.r*0.14, Math.sin(ta+0.6)*bo.r*0.14, bo.r*0.04, 0, 7); ctx.fill();
  ctx.restore();
}

function renderHUD(){
  if(G.state!=='play'&&G.state!=='dead'&&G.state!=='paused'&&G.state!=='settings') return;
  const L=G.level; ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.85)'; ctx.shadowBlur=8; ctx.fillStyle='#cfe4ff'; ctx.font='15px "Segoe UI",sans-serif';
  const R=isRTL();
  ctx.textAlign = R?'right':'left';
  const xStart = R?CFG.W-14:14;
  ctx.fillText(`${tr('level')} ${G.lvl+1}/${LEVELS.length}`, xStart, 22);
  ctx.textAlign = R?'left':'right';
  const xEnd = R?14:CFG.W-14;
  ctx.fillText(`${tr('deaths')}: ${G.deaths}`, xEnd, 22);
  // عدّاد الأعداء + Heat bar
  const p=G.player;
  ctx.textAlign='center';
  if(!L.boss) ctx.fillText(`${tr('enemies')}: ${liveEnemies()}`, CFG.W/2, 22);
  if(Snd.muted){ ctx.fillText(tr('muted'), CFG.W/2, 40); }
  // Heat bar
  const hx=CFG.W/2-70, hy=33, hw=140, hh=8;
  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(60,60,80,0.5)'; ctx.fillRect(hx,hy,hw,hh);
  const heatRatio = p.overheated ? 1 : p.heat/CFG.HEAT_MAX;
  const hCol = p.overheated ? '#ff4455' : (heatRatio>0.7 ? '#ff8844' : '#4de3ff');
  ctx.fillStyle=hCol; ctx.fillRect(hx,hy,hw*heatRatio,hh);
  ctx.strokeStyle='rgba(150,180,220,0.3)'; ctx.lineWidth=1; ctx.strokeRect(hx,hy,hw,hh);

  // توقيت المستوى
  const secs = Math.floor(G.time/60);
  ctx.shadowBlur=8;
  ctx.fillStyle='rgba(207,228,255,0.5)'; ctx.font='14px "Segoe UI",sans-serif'; ctx.textAlign=R?'left':'right';
  ctx.fillText(`${Math.floor(secs/60)}:${(secs%60).toString().padStart(2,'0')}`, R?CFG.W-14:14, 38);

  // مؤشرات الدرع و rapid fire
  if(p.shield>0){ ctx.fillStyle='#7ac7ff'; ctx.globalAlpha=0.6+0.3*Math.sin(frameCount*0.1);
    ctx.fillRect(14,CFG.H-20, 20,14); ctx.fillStyle='#eaf3ff'; ctx.globalAlpha=1;
    ctx.font='12px "Segoe UI",sans-serif'; ctx.fillText('SHIELD', 38, CFG.H-9); }
  if(p.rapid>0){ ctx.fillStyle='#ffd94d'; ctx.globalAlpha=0.6+0.3*Math.sin(frameCount*0.1);
    ctx.fillRect(R?CFG.W-34:14,CFG.H-36, 20,14); ctx.fillStyle='#eaf3ff'; ctx.globalAlpha=1;
    ctx.font='12px "Segoe UI",sans-serif'; ctx.fillText('RAPID', R?CFG.W-56:38, CFG.H-25); }

  // شريط صحة الزعيم
  if(L.boss && G.boss){ const bw=360, bx=CFG.W/2-bw/2, by=32;
    ctx.shadowBlur=0; ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.fillRect(bx-2,by-2,bw+4,14);
    ctx.fillStyle='#4a1520'; ctx.fillRect(bx,by,bw,10);
    ctx.fillStyle= G.boss.phase===2?'#ff5f6d':'#ff9f43'; ctx.fillRect(bx,by,bw*Math.max(0,G.boss.hp/G.boss.maxHp),10);
    ctx.fillStyle='#eaf3ff'; ctx.textAlign='center'; ctx.font='bold 14px "Segoe UI",sans-serif'; ctx.fillText(tr('boss'), CFG.W/2, by-8);
    ctx.shadowBlur=8; }

  if(G.lvl===0){ ctx.globalAlpha=0.5; ctx.textAlign='center'; ctx.font='13px "Segoe UI",sans-serif';
    ctx.fillText(tr('hintCombat'), CFG.W/2, CFG.H-30); ctx.fillText(tr('hintKeys'), CFG.W/2, CFG.H-12); }

  // رسالة وسط الشاشة (overheat/بوابة)
  if(G.msgT>0){ ctx.globalAlpha=Math.min(1,G.msgT/30); ctx.font='bold 20px "Segoe UI",sans-serif';
    ctx.fillStyle= p.overheated?'#ff4455':'#9dffce'; ctx.textAlign='center';
    ctx.fillText(p.overheated?tr('reload'):(G.gateOpen?tr('exitOpen'):tr('clearAll')), CFG.W/2, 90); ctx.globalAlpha=1; }
  else if(G.state==='play' && !G.level.boss && !G.gateOpen && liveEnemies()>0){
    ctx.globalAlpha=0.4; ctx.font='13px "Segoe UI",sans-serif'; ctx.fillStyle='#cfe4ff'; ctx.textAlign='center';
    ctx.fillText(tr('clearAll'), CFG.W/2, 90); ctx.globalAlpha=1; }

  if(G.flashT>0){ ctx.globalAlpha=Math.min(1,G.flashT/30); ctx.fillStyle='#eaf3ff';
    ctx.font='bold 26px "Segoe UI",sans-serif'; ctx.textAlign='center';
    ctx.fillText(LEVELS[G.lvl].name[LANG], CFG.W/2, 120); }
  ctx.restore();
}

let uiButtons=[]; // {x,y,w,h,fn}
function button(x,y,w,h,label,fn,opts={}){
  const hot = mouse.x>=x&&mouse.x<=x+w&&mouse.y>=y&&mouse.y<=y+h;
  ctx.fillStyle = hot? 'rgba(77,227,255,0.22)':'rgba(120,150,190,0.10)';
  ctx.strokeStyle = hot? '#4de3ff':'rgba(150,180,220,0.45)'; ctx.lineWidth=1.5;
  ctx.shadowBlur = hot ? 18 : 0;
  ctx.shadowColor = hot ? 'rgba(77,227,255,0.3)' : 'transparent';
  ctx.fillRect(x,y,w,h); ctx.strokeRect(x,y,w,h);
  ctx.shadowBlur = 0;
  ctx.fillStyle= opts.color||'#eaf3ff'; ctx.font=opts.font||'18px "Segoe UI",sans-serif'; ctx.textAlign='center';
  ctx.textBaseline='middle'; ctx.fillText(label, x+w/2, y+h/2); ctx.textBaseline='alphabetic';
  uiButtons.push({x,y,w,h,fn});
}

function slider(label,val,y,setter){
  const bx=CFG.W/2-150, bw=300;
  ctx.fillStyle='#cfe4ff'; ctx.font='18px "Segoe UI",sans-serif'; ctx.textAlign='center';
  ctx.fillText(`${label}: ${Math.round(val*100)}%`, CFG.W/2, y-8);
  // زر ناقص/زائد + شريط
  button(bx-52,y,40,30,'−',()=>setter(val-0.1),{font:'20px "Segoe UI",sans-serif'});
  button(bx+bw+12,y,40,30,'+',()=>setter(val+0.1),{font:'20px "Segoe UI",sans-serif'});
  ctx.fillStyle='rgba(120,150,190,0.25)'; ctx.fillRect(bx,y+6,bw,18);
  ctx.fillStyle='#4de3ff'; ctx.fillRect(bx,y+6,bw*val,18);
  ctx.strokeStyle='rgba(150,180,220,0.5)'; ctx.lineWidth=1; ctx.strokeRect(bx,y+6,bw,18);
  // النقر على الشريط يضبط القيمة
  uiButtons.push({x:bx,y:y+6,w:bw,h:18,fn:()=>setter((mouse.x-bx)/bw)});
}

/* ————————————————— الإدخال ————————————————— */
const KEYS={ left:false, right:false, flipPressed:false, firePressed:false, dashPressed:false, restartPressed:false };
const mouse={ x:CFG.W/2, y:CFG.H/2 };

function firstInteract(){ Snd.init(); Snd.resume(); }

function handleKey(code,down,repeat){
  if(down) firstInteract();
  if(down && !repeat && (code==='Escape')){
    if(G.state==='play'){ G.settingsReturn='play'; G.state='settings'; return; }
    if(G.state==='settings' && G.settingsReturn==='play'){ G.state='play'; return; }
  }
  if(down && !repeat && G.state==='menu' && code!=='KeyM' && code!=='Escape'){ startGame(); return; }
  switch(code){
    case 'ArrowLeft': case 'KeyA': KEYS.left=down; break;
    case 'ArrowRight': case 'KeyD': KEYS.right=down; break;
    case 'Space': case 'ArrowUp': case 'KeyW': if(down&&!repeat) KEYS.flipPressed=true; break;
    case 'ShiftLeft': case 'ShiftRight': if(down&&!repeat) KEYS.dashPressed=true; break;
    case 'KeyR': if(down&&!repeat){ if(G.state==='won') startGame(); else if(G.state==='play'||G.state==='dead') loadLevel(G.lvl); else if(G.state==='deathscreen'){ KEYS.restartPressed=true; } else if(G.state==='levelcomplete'){ if(G.lvl+1<LEVELS.length) loadLevel(G.lvl+1); else G.state='won'; } } break;
    case 'KeyM': if(down&&!repeat) Snd.toggleMute(); break;
  }
}
window.addEventListener('keydown', e=>{ if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault(); handleKey(e.code,true,e.repeat); });
window.addEventListener('keyup', e=>handleKey(e.code,false,false));

function setMouse(e){ const r=cv.getBoundingClientRect(); mouse.x=(e.clientX-r.left)/r.width*CFG.W; mouse.y=(e.clientY-r.top)/r.height*CFG.H; }
window.addEventListener('mousemove', setMouse);
window.addEventListener('mousedown', e=>{
  firstInteract(); setMouse(e);
  for(const b of uiButtons){ if(mouse.x>=b.x&&mouse.x<=b.x+b.w&&mouse.y>=b.y&&mouse.y<=b.y+b.h){ b.fn(); return; } }
  if(G.state==='play'){ KEYS.firePressed=true; }
  else if(G.state==='deathscreen'){ KEYS.restartPressed=true; }
});
window.addEventListener('touchstart', e=>{
  e.preventDefault(); firstInteract(); const t=e.changedTouches[0];
  const r=cv.getBoundingClientRect(); mouse.x=(t.clientX-r.left)/r.width*CFG.W; mouse.y=(t.clientY-r.top)/r.height*CFG.H;
  // UI buttons
  for(const b of uiButtons){ if(mouse.x>=b.x&&mouse.x<=b.x+b.w&&mouse.y>=b.y&&mouse.y<=b.y+b.h){ b.fn(); return; } }
  if(G.state==='play'){ KEYS.firePressed=true; }
}, {passive:false});
window.addEventListener('touchmove', e=>{
  e.preventDefault(); const t=e.changedTouches[0];
  const r=cv.getBoundingClientRect(); mouse.x=(t.clientX-r.left)/r.width*CFG.W; mouse.y=(t.clientY-r.top)/r.height*CFG.H;
}, {passive:false});
window.addEventListener('contextmenu', e=>e.preventDefault());
window.addEventListener('resize', ()=>{
  const r=cv.getBoundingClientRect(); mouse.x=Math.min(mouse.x, r.width); mouse.y=Math.min(mouse.y, r.height);
});

/* ————————————————— حلقة اللعبة 60Hz ————————————————— */
const STEP=1000/60; let acc=0, last=performance.now();
function frame(now){ acc+=Math.min(now-last,100); last=now; while(acc>=STEP){ update(); acc-=STEP; } render(); requestAnimationFrame(frame); }

/* بدء: حمّل الإعدادات ثم اختيار اللغة (أو القائمة لو محفوظ) */
if(loadSettings()) G.state='menu'; else G.state='langselect';
requestAnimationFrame(frame);

/* واجهة اختبار آلي (headless) */
window.GAME={ G, CFG, LEVELS, KEYS, mouse, I18N,
  loadLevel, startGame, update, render, handleKey, parseLevel, doFlip, isSolid, tryShoot,
  liveEnemies, setLang:(l)=>{LANG=l;}, getLang:()=>LANG, Snd };
</script>
</body>

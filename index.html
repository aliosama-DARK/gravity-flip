/* ————————————————— Snd: صوت مولّد + مستويات مستقلة ————————————————— */
const Snd = {
  ctx:null, master:null, sfxBus:null, musBus:null, muted:false, started:false,
  musicVol:0.10, sfxVol:0.28, _chordStep:0, _nextChordT:0,
  init() {
    if (this.started) return;
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    this.ctx = new AC();
    this.master = this.ctx.createGain(); this.master.gain.value = this.muted?0:1; this.master.connect(this.ctx.destination);
    this.sfxBus = this.ctx.createGain(); this.sfxBus.gain.value = this.sfxVol; this.sfxBus.connect(this.master);
    this.musBus = this.ctx.createGain(); this.musBus.gain.value = this.musicVol; this.musBus.connect(this.master);
    this.started = true; this._startMusic();
  },
  resume(){ if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume(); },
  setMusic(v){ this.musicVol = Math.max(0, Math.min(1, v)); if (this.musBus) this.musBus.gain.setTargetAtTime(this.musicVol, this.ctx.currentTime, 0.02); saveSettings(); },
  setSfx(v){ this.sfxVol = Math.max(0, Math.min(1, v)); if (this.sfxBus) this.sfxBus.gain.setTargetAtTime(this.sfxVol, this.ctx.currentTime, 0.02); saveSettings(); },
  toggleMute(){ this.muted = !this.muted; if (this.master) this.master.gain.setTargetAtTime(this.muted?0:1, this.ctx.currentTime, 0.02); },
  _tone(f0,f1,dur,type,vol,when=0,bus=null){
    if (!this.started) return;
    const t = this.ctx.currentTime + when, o = this.ctx.createOscillator(), g = this.ctx.createGain();
    o.type = type; o.frequency.setValueAtTime(f0, t);
    if (f1 !== f0) o.frequency.exponentialRampToValueAtTime(Math.max(f1,1), t+dur);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(vol, t+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
    o.connect(g); g.connect(bus||this.sfxBus); o.start(t); o.stop(t+dur+0.05);
  },
  flip(up){ up? this._tone(300,620,0.15,'triangle',0.9) : this._tone(620,300,0.15,'triangle',0.9); },
  death(){ this._tone(400,80,0.3,'sawtooth',0.7); },
  checkpoint(){ this._tone(523,523,0.12,'sine',0.8,0); this._tone(659,659,0.14,'sine',0.8,0.1); },
  winLevel(){ [523,659,784,1047].forEach((f,i)=>this._tone(f,f,0.14,'sine',0.8,i*0.09)); },
  land(){ this._tone(150,90,0.05,'triangle',0.35); },
  crumble(){ this._tone(120,60,0.18,'square',0.25); },
  trip(){ this._tone(700,480,0.1,'triangle',0.5); },
  shoot(){ this._tone(760,300,0.07,'square',0.35); },
  dry(){ this._tone(180,150,0.05,'square',0.25); },
  hit(){ this._tone(500,180,0.08,'square',0.4); },
  enemyDie(){ this._tone(320,90,0.14,'triangle',0.5); },
  bossHit(){ this._tone(240,120,0.09,'square',0.5); },
  gateOpen(){ [392,523,659].forEach((f,i)=>this._tone(f,f,0.13,'sine',0.6,i*0.08)); },
  CHORDS:[[110,164.81,220,261.63],[87.31,130.81,174.61,220],[130.81,196,261.63,329.63],[98,146.83,196,246.94]],
  PENTA:[440,523.25,587.33,659.25,783.99], CHORD_DUR:4,
  _startMusic(){
    this._nextChordT = this.ctx.currentTime + 0.15;
    setInterval(()=>{ if(!this.started) return;
      while (this._nextChordT < this.ctx.currentTime + 1.2){
        this._playChord(this._chordStep % this.CHORDS.length, this._nextChordT, this._chordStep);
        this._nextChordT += this.CHORD_DUR; this._chordStep++;
      }
    }, 300);
  },
  _playChord(idx,t,step){
    const D = this.CHORD_DUR;
    this.CHORDS[idx].forEach((f,i)=>this._padNote(f,t,D+1.4,0.14-i*0.02,'sine'));
    this._padNote(this.CHORDS[idx][0]/2, t, D+1.6, 0.07, 'triangle');
    const n1 = this.PENTA[(step*3+1)%5], n2 = this.PENTA[(step*2+3)%5];
    this._melNote(n1, t+0.6); if (step%2===0) this._melNote(n2, t+2.4);
  },
  _padNote(f,t,dur,vol,type){
    const o=this.ctx.createOscillator(), g=this.ctx.createGain(); o.type=type; o.frequency.value=f;
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(vol,t+1.1);
    g.gain.setValueAtTime(vol,t+dur-1.6); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g); g.connect(this.musBus); o.start(t); o.stop(t+dur+0.1);
  },
  _melNote(f,t){
    const o=this.ctx.createOscillator(), g=this.ctx.createGain(); o.type='triangle'; o.frequency.value=f;
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.05,t+0.06);
    g.gain.exponentialRampToValueAtTime(0.0001,t+1.9); o.connect(g); g.connect(this.musBus); o.start(t); o.stop(t+2);
  },
};

/* حفظ/تحميل الإعدادات */
function saveSettings(){
  try { localStorage.setItem('flip_cfg', JSON.stringify({ lang:LANG, mus:Snd.musicVol, sfx:Snd.sfxVol })); } catch(e){}
}
function loadSettings(){
  try {
    const s = JSON.parse(localStorage.getItem('flip_cfg'));
    if (s){ if (s.lang) LANG = s.lang; if (typeof s.mus==='number') Snd.musicVol = s.mus; if (typeof s.sfx==='number') Snd.sfxVol = s.sfx; return true; }
  } catch(e){}
  return false;
}

/* ————————————————— تحليل المرحلة ————————————————— */
function parseLevel(idx) {
  const lv = LEVELS[idx], grid = lv.grid;
  const rows = grid.length, cols = grid[0].length, T = CFG.TILE;
  const solid = [], spikes = [], enemies = [], checkpoints = [];
  const platforms = [], crumble = [], crumbleMap = {}, trips = [];
  let star = null, spawn = { x:T*2, y:T*2 }, bossSpawn = null;
  const consumed = {};
  for (let r=0;r<rows;r++){ solid[r]=[];
    for (let c=0;c<cols;c++){
      const ch = grid[r][c]; solid[r][c] = (ch==='#'||ch==='x');
      const x=c*T, y=r*T;
      if (ch==='^') spikes.push({r,c,type:'up'});
      if (ch==='v') spikes.push({r,c,type:'down'});
      if (ch==='>') spikes.push({r,c,type:'right'});
      if (ch==='<') spikes.push({r,c,type:'left'});
      if (ch==='C') checkpoints.push({r,c,active:false});
      if (ch==='*') star = { x:x+T/2, y:y+T/2 };
      if (ch==='P') spawn = { x:x+T/2-CFG.PSIZE/2, y:y+T-CFG.PSIZE };
      if (ch==='o') enemies.push(makeEnemy(grid,r,c,'h'));
      if (ch==='I') enemies.push(makeEnemy(grid,r,c,'v'));
      if (ch==='T') trips.push({r,c});
      if (ch==='B') bossSpawn = { x:x+T/2, y:y+T/2 };
      if (ch==='x'){ const o={r,c,state:'solid',timer:0}; crumble.push(o); crumbleMap[r+','+c]=o; }
      if ((ch==='H'||ch==='V') && !consumed[r+','+c]){
        let c2=c; while (c2+1<cols && grid[r][c2+1]===ch) c2++;
        for (let cc=c;cc<=c2;cc++) consumed[r+','+cc]=true;
        platforms.push({ axis: ch==='H'?'h':'v', baseX:x, baseY:y, x, y, w:(c2-c+1)*T, h:T,
          range:CFG.PLAT_RANGE, speed: ch==='H'?CFG.PLAT_SPEED_H:CFG.PLAT_SPEED_V, dx:0, dy:0 });
      }
    }
  }
  enemies.forEach((e,i)=>e.id=i);
  return { rows, cols, solid, spikes, enemies, checkpoints, platforms, crumble, crumbleMap, trips,
           star, spawn, bossSpawn, boss: !!lv.boss, bossType: lv.bossType||'warden', theme: lv.theme||0, w:cols*T, h:rows*T };
}

function makeEnemy(grid,r,c,axis){
  const T=CFG.TILE, R=CFG.ENEMY_R;
  const pass=(rr,cc)=> rr>=0&&rr<grid.length&&cc>=0&&cc<grid[0].length && grid[rr][cc]!=='#' && grid[rr][cc]!=='x';
  const e={ axis, x:c*T+T/2, y:r*T+T/2, dir:1, phase:(r*7+c)%100, hp:CFG.ENEMY_HP, alive:true };
  if (axis==='h'){ let cl=c,cr=c;
    for(let i=0;i<CFG.ENEMY_PATROL;i++){ if(pass(r,cl-1)) cl--; else break; }
    for(let i=0;i<CFG.ENEMY_PATROL;i++){ if(pass(r,cr+1)) cr++; else break; }
    e.minX=cl*T+R+2; e.maxX=(cr+1)*T-R-2; e.minY=e.y; e.maxY=e.y;
  } else { let ru=r,rd=r;
    for(let i=0;i<CFG.ENEMY_PATROL;i++){ if(pass(ru-1,c)) ru--; else break; }
    for(let i=0;i<CFG.ENEMY_PATROL;i++){ if(pass(rd+1,c)) rd++; else break; }
    e.minY=ru*T+R+2; e.maxY=(rd+1)*T-R-2; e.minX=e.x; e.maxX=e.x;
  }
  return e;
}

function loadLevel(idx){
  G.lvl = idx; G.level = parseLevel(idx); G.tick = 0;
  G.killed = new Set();
  G.checkpoint = { x:G.level.spawn.x, y:G.level.spawn.y, grav:1 };
  G.gravDir = 1; G.bullets=[]; G.ebullets=[];
  G.gateOpen = false;   // البوابة تبدأ مقفولة كل مرحلة (تصلح باگ انتقالها بين المراحل)
  setupBoss();
  respawn();
  G.camX = Math.max(0, Math.min(G.player.x - CFG.W/2, G.level.w - CFG.W));
  G.state='play'; G.flashT=90; G.msgT=0;
}

function setupBoss(){
  const L = G.level;
  if (!(L.boss && L.bossSpawn)){ G.boss = null; return; }
  const type = L.bossType || 'warden';
  const base = { type, x:L.bossSpawn.x, y:L.bossSpawn.y, atkT:0, windup:0, phase:1,
                 alive:true, hitFlash:0, charge:0, atkKind:0, spin:0, laser:null };
  if (type === 'tyrant'){
    // الطاغية: أضخم، أصح، يحوّم ويطارد، هجمات مختلفة تماماً
    G.boss = Object.assign(base, { vx:0, vy:0, hp:CFG.TYRANT_HP, maxHp:CFG.TYRANT_HP,
      r:CFG.TYRANT_R, homeY:L.bossSpawn.y, bob:0 });
  } else {
    // الحارس: يرتد ويطلق رشقات دائرية
    G.boss = Object.assign(base, { vx:CFG.BOSS_SPEED, vy:CFG.BOSS_SPEED*0.7,
      hp:CFG.BOSS_HP, maxHp:CFG.BOSS_HP, r:CFG.BOSS_R });
  }
}

function liveEnemies(){
  if (!G.level) return 0;
  return G.level.enemies.filter(e=>!G.killed.has(e.id)).length;
}
function refillAmmo(){
  // في مرحلة الزعيم: الذخيرة = صحة الزعيم + هامش للأخطاء
  if (G.level && G.level.boss && G.boss) G.ammo = G.boss.maxHp + CFG.BOSS_AMMO_BUFFER;
  else G.ammo = liveEnemies() + CFG.AMMO_BUFFER;
}

function respawn(){
  const p=G.player, L=G.level;
  p.x=G.checkpoint.x; p.y=G.checkpoint.y; p.vx=0; p.vy=0;
  G.gravDir=G.checkpoint.grav;
  p.grounded=true; p.coyote=0; p.buffer=0; p.airT=0; p.rotT=1; p.squash=0; p.ride=null; p.flipCD=0; p.fireCD=0;
  G.bullets=[]; G.ebullets=[];
  if (L){
    for (const cb of L.crumble){ cb.state='solid'; cb.timer=0; L.solid[cb.r][cb.c]=true; }
    // الأعداء الأحياء (اللي ماتقتلوش) يرجعوا لمكانهم
    for (const e of L.enemies){ e.alive = !G.killed.has(e.id); e.dir = 1; }
  }
  if (G.boss){ setupBoss(); }   // الزعيم يرجع كامل عند الموت
  refillAmmo();
}

/* ————————————————— فيزياء وتصادم ————————————————— */
function isSolid(level,r,c){
  if (c<0||c>=level.cols) return true;
  if (r<0||r>=level.rows) return false;
  return level.solid[r][c];
}
function collideAxis(p,level,axis){
  const T=CFG.TILE,S=CFG.PSIZE;
  const x0=Math.floor(p.x/T),x1=Math.floor((p.x+S-0.01)/T);
  const y0=Math.floor(p.y/T),y1=Math.floor((p.y+S-0.01)/T);
  let hit=0;
  for(let r=y0;r<=y1;r++)for(let c=x0;c<=x1;c++){
    if(!isSolid(level,r,c)) continue;
    if(axis==='x'){ if(p.vx>0)p.x=c*T-S; else if(p.vx<0)p.x=(c+1)*T; p.vx=0; hit=1; }
    else { if(p.vy>0){p.y=r*T-S;hit=1;} else if(p.vy<0){p.y=(r+1)*T;hit=-1;} p.vy=0; }
    return hit;
  }
  return 0;
}
const aabb=(ax,ay,aw,ah,bx,by,bw,bh)=> ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;

function updatePlatforms(L){
  for (const pl of L.platforms){
    const span=pl.range*2; let ph=(G.tick*pl.speed)%span;
    const tri = ph<=pl.range ? ph : span-ph;
    const nx = pl.axis==='h'? pl.baseX+tri : pl.baseX;
    const ny = pl.axis==='v'? pl.baseY+tri : pl.baseY;
    pl.dx=nx-pl.x; pl.dy=ny-pl.y; pl.x=nx; pl.y=ny;
  }
}
function collidePlatformsX(p,L){ const S=CFG.PSIZE;
  for (const pl of L.platforms){ if(!aabb(p.x,p.y,S,S,pl.x,pl.y,pl.w,pl.h)) continue;
    if(p.vx>0){p.x=pl.x-S;p.vx=0;} else if(p.vx<0){p.x=pl.x+pl.w;p.vx=0;} }
}
function collidePlatformsY(p,L){ const S=CFG.PSIZE; let hit=0;
  for (const pl of L.platforms){ if(!aabb(p.x,p.y,S,S,pl.x,pl.y,pl.w,pl.h)) continue;
    if(p.vy>0){p.y=pl.y-S;p.vy=0;hit=1;if(G.gravDir>0)p.ride=pl;}
    else if(p.vy<0){p.y=pl.y+pl.h;p.vy=0;hit=-1;if(G.gravDir<0)p.ride=pl;} }
  return hit;
}
function triggerCrumbleUnder(p,L){
  const T=CFG.TILE,S=CFG.PSIZE;
  const row = G.gravDir>0 ? Math.floor((p.y+S+1)/T) : Math.floor((p.y-1)/T);
  const cA=Math.floor(p.x/T), cB=Math.floor((p.x+S-0.01)/T);
  for(let c=cA;c<=cB;c++){ const o=L.crumbleMap[row+','+c];
    if(o&&o.state==='solid'){ o.state='warn'; o.timer=CFG.CRUMBLE_WARN; Snd.crumble(); } }
}
function updateCrumble(p,L){
  const T=CFG.TILE,S=CFG.PSIZE;
  for(const o of L.crumble){
    if(o.state==='warn'){ if(--o.timer<=0){ o.state='gone'; o.timer=CFG.CRUMBLE_GONE; L.solid[o.r][o.c]=false; } }
    else if(o.state==='gone'){ if(--o.timer<=0){
      if(!aabb(p.x,p.y,S,S,o.c*T,o.r*T,T,T)){ o.state='solid'; L.solid[o.r][o.c]=true; } else o.timer=6; } }
  }
}
function doFlip(){
  const p=G.player;
  G.gravDir*=-1; p.vy=CFG.FLIP_KICK*G.gravDir;
  p.grounded=false; p.coyote=0; p.buffer=0; p.ride=null;
  p.rotFrom=G.gravDir>0?Math.PI:0; p.rotT=0;
  Snd.flip(G.gravDir<0);
  spawnBurst(p.x+CFG.PSIZE/2, p.y+CFG.PSIZE/2, 6, '#4de3ff', 2.5);
}
function killPlayer(){
  if(G.state!=='play') return;
  G.state='dead'; G.stateT=0; G.deaths++; G.shake=14; Snd.death();
  spawnBurst(G.player.x+CFG.PSIZE/2, G.player.y+CFG.PSIZE/2, 22, '#ff5566', 5);
}

/* ————————————————— قتال: إطلاق، طلقات، أعداء ————————————————— */
function tryShoot(){
  const p=G.player;
  if (G.state!=='play') return;
  if (p.fireCD>0) return;
  if (G.ammo<=0){ Snd.dry(); G.msgT=90; return; }
  const cx=p.x+CFG.PSIZE/2, cy=p.y+CFG.PSIZE/2;
  const a=p.aim;
  G.bullets.push({ x:cx+Math.cos(a)*16, y:cy+Math.sin(a)*16,
                   vx:Math.cos(a)*CFG.BULLET_SPEED, vy:Math.sin(a)*CFG.BULLET_SPEED, life:CFG.BULLET_LIFE });
  G.ammo--; p.fireCD=CFG.FIRE_CD;
  // ارتداد بسيط عكس التصويب — يمكن استغلاله للدفع
  p.vx -= Math.cos(a)*CFG.RECOIL; p.vy -= Math.sin(a)*CFG.RECOIL*0.6;
  Snd.shoot();
  spawnBurst(cx+Math.cos(a)*18, cy+Math.sin(a)*18, 3, '#ffe08a', 2);
}
function updateBullets(L){
  const T=CFG.TILE;
  for (let i=G.bullets.length-1;i>=0;i--){
    const b=G.bullets[i]; b.x+=b.vx; b.y+=b.vy; b.life--;
    let dead = b.life<=0;
    if(!dead){ const c=Math.floor(b.x/T), r=Math.floor(b.y/T); if(isSolid(L,r,c)){ dead=true; spawnBurst(b.x,b.y,3,'#9fb6d0',1.5); } }
    if(!dead){
      for(const e of L.enemies){ if(!e.alive) continue;
        const dx=b.x-e.x, dy=b.y-e.y;
        if(dx*dx+dy*dy < (CFG.ENEMY_R+CFG.BULLET_R)*(CFG.ENEMY_R+CFG.BULLET_R)){
          e.hp--; dead=true;
          if(e.hp<=0){ e.alive=false; G.killed.add(e.id); Snd.enemyDie();
            spawnBurst(e.x,e.y,16,e.axis==='v'?'#c774ff':'#ff9f43',4);
            if(liveEnemies()===0 && !G.gateOpen && !L.boss){ G.gateOpen=true; G.msgT=120; Snd.gateOpen(); }
          } else { Snd.hit(); spawnBurst(b.x,b.y,4,'#ffd0d0',2); }
          break;
        }
      }
    }
    if(!dead && G.boss && G.boss.alive){
      const bo=G.boss, dx=b.x-bo.x, dy=b.y-bo.y;
      if(dx*dx+dy*dy < (bo.r+CFG.BULLET_R)*(bo.r+CFG.BULLET_R)){
        bo.hp--; bo.hitFlash=6; dead=true; Snd.bossHit();
        spawnBurst(b.x,b.y,6,'#ffd0d0',2.5);
        if(bo.hp<=0){ bo.alive=false; bossDefeated(); }
        else if(bo.hp<=bo.maxHp/2) bo.phase=2;
      }
    }
    if(dead) G.bullets.splice(i,1);
  }
}
function updateEnemies(L,px0,px1,py0,py1){
  for(const e of L.enemies){ if(!e.alive) continue;
    if(e.axis==='h'){ e.x+=CFG.ENEMY_SPEED*e.dir; if(e.x<e.minX){e.x=e.minX;e.dir=1;} if(e.x>e.maxX){e.x=e.maxX;e.dir=-1;} }
    else { e.y+=CFG.ENEMY_SPEED_V*e.dir; if(e.y<e.minY){e.y=e.minY;e.dir=1;} if(e.y>e.maxY){e.y=e.maxY;e.dir=-1;} }
    if(G.debug.noEnemies) continue;
    const cx=Math.max(px0,Math.min(e.x,px1)), cy=Math.max(py0,Math.min(e.y,py1));
    const dx=e.x-cx, dy=e.y-cy;
    if(dx*dx+dy*dy < CFG.ENEMY_HIT_R*CFG.ENEMY_HIT_R){ killPlayer(); return true; }
  }
  return false;
}

/* ————————————————— الزعيم ————————————————— */
function bossDefeated(){
  const bo=G.boss;
  spawnBurst(bo.x,bo.y,40,'#ffd94d',5);
  G.gateOpen=true;
  G.state='levelend'; G.stateT=0; Snd.winLevel(); G.shake=18;
}
function updateBoss(L,p){
  const bo=G.boss; if(!bo||!bo.alive) return;
  if(bo.hitFlash>0) bo.hitFlash--;
  if(bo.type==='tyrant') updateTyrant(L,p,bo); else updateWarden(L,p,bo);
  if(!bo.alive || G.state!=='play') return;
  // تصادم الزعيم مع اللاعب (مشترك)
  const pcx=p.x+CFG.PSIZE/2, pcy=p.y+CFG.PSIZE/2, dx=pcx-bo.x, dy=pcy-bo.y;
  if(dx*dx+dy*dy < (bo.r+CFG.PSIZE/2*0.8)*(bo.r+CFG.PSIZE/2*0.8)){ killPlayer(); }
}

/* الحارس (زعيم 1): يرتد داخل الساحة + رشقات دائرية + اندفاع بالطور 2 */
function updateWarden(L,p,bo){
  const T=CFG.TILE;
  if(bo.charge>0){ bo.charge--; bo.x+=bo.cvx; bo.y+=bo.cvy; }
  else { bo.x+=bo.vx; bo.y+=bo.vy; }
  const mC=Math.floor(bo.x/T), mR=Math.floor(bo.y/T);
  if(isSolid(L,mR,Math.floor((bo.x-bo.r)/T))||bo.x-bo.r<T){ bo.x=Math.max(bo.x,T+bo.r); bo.vx=Math.abs(bo.vx); if(bo.charge>0)bo.cvx=Math.abs(bo.cvx); }
  if(isSolid(L,mR,Math.floor((bo.x+bo.r)/T))||bo.x+bo.r>L.w-T){ bo.x=Math.min(bo.x,L.w-T-bo.r); bo.vx=-Math.abs(bo.vx); if(bo.charge>0)bo.cvx=-Math.abs(bo.cvx); }
  if(isSolid(L,Math.floor((bo.y-bo.r)/T),mC)||bo.y-bo.r<T){ bo.y=Math.max(bo.y,T+bo.r); bo.vy=Math.abs(bo.vy); if(bo.charge>0)bo.cvy=Math.abs(bo.cvy); }
  if(isSolid(L,Math.floor((bo.y+bo.r)/T),mC)||bo.y+bo.r>L.h-T){ bo.y=Math.min(bo.y,L.h-T-bo.r); bo.vy=-Math.abs(bo.vy); if(bo.charge>0)bo.cvy=-Math.abs(bo.cvy); }
  bo.atkT++;
  const period = bo.phase===2 ? CFG.BOSS_ATK_PERIOD*0.6 : CFG.BOSS_ATK_PERIOD;
  if(bo.windup>0){ bo.windup--;
    if(bo.windup===0){ const pcx=p.x+CFG.PSIZE/2, pcy=p.y+CFG.PSIZE/2;
      if(bo.pendingCharge){ const a=Math.atan2(pcy-bo.y, pcx-bo.x); bo.charge=26; bo.cvx=Math.cos(a)*6.5; bo.cvy=Math.sin(a)*6.5; bo.pendingCharge=false; }
      else { const n=bo.phase===2?12:8; for(let i=0;i<n;i++){ const a=i/n*Math.PI*2+(bo.atkT*0.1);
        G.ebullets.push({x:bo.x,y:bo.y,vx:Math.cos(a)*CFG.EBULLET_SPEED,vy:Math.sin(a)*CFG.EBULLET_SPEED,life:CFG.EBULLET_LIFE}); } Snd.hit(); }
    }
  } else if(bo.atkT>=period){ bo.atkT=0; bo.windup=CFG.BOSS_WINDUP;
    bo.pendingCharge = bo.phase===2 && (Math.floor(bo.x+bo.y)%2===0); }
}

/* الطاغية (زعيم 2): يحوّم ويطاردك أفقياً + رشقة موجّهة + مطر رصاص + نبضة تقلب جاذبيتك (طور 2) */
function updateTyrant(L,p,bo){
  const T=CFG.TILE, pcx=p.x+CFG.PSIZE/2, pcy=p.y+CFG.PSIZE/2;
  // حركة: يحوّم أعلى الساحة ويلاحق اللاعب أفقياً
  bo.bob += 0.045; bo.y = bo.homeY + Math.sin(bo.bob)*18;
  const dir = Math.sign(pcx - bo.x);
  bo.x += dir * CFG.TYRANT_TRACK * (bo.phase===2?1.35:1);
  bo.x = Math.max(T+bo.r, Math.min(L.w-T-bo.r, bo.x));
  bo.spin += 0.03;
  bo.atkT++;
  const period = bo.phase===2 ? CFG.TYRANT_ATK_PERIOD*0.62 : CFG.TYRANT_ATK_PERIOD;
  if(bo.windup>0){ bo.windup--;
    if(bo.windup===0) tyrantFire(L,p,bo);
  } else if(bo.atkT>=period){ bo.atkT=0; bo.windup=CFG.TYRANT_WINDUP;
    // تسلسل الهجمات: طور1 [موجّهة، مطر] · طور2 يضيف [نبضة جاذبية]
    const kinds = bo.phase===2 ? [0,1,2,0,1] : [0,1];
    bo.atkKind = kinds[(bo.atkStep=(bo.atkStep||0)+1) % kinds.length];
  }
}
function tyrantFire(L,p,bo){
  const T=CFG.TILE, pcx=p.x+CFG.PSIZE/2, pcy=p.y+CFG.PSIZE/2;
  const sp=CFG.TTBULLET_SPEED;
  if(bo.atkKind===0){ // رشقة موجّهة نحو اللاعب (مروحة)
    const a0=Math.atan2(pcy-bo.y, pcx-bo.x); const n=bo.phase===2?5:3, spread=0.26;
    for(let i=0;i<n;i++){ const a=a0+(i-(n-1)/2)*spread;
      G.ebullets.push({x:bo.x,y:bo.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:CFG.EBULLET_LIFE}); }
    Snd.hit();
  } else if(bo.atkKind===1){ // مطر رصاص من السقف عبر الأعمدة
    const n=bo.phase===2?12:8, span=L.w-2*T;
    for(let i=0;i<n;i++){ const x=T + ((i*span/n) + (bo.atkT*17)%(span/n));
      G.ebullets.push({x, y:T+4, vx:0, vy:sp*0.9, life:CFG.EBULLET_LIFE}); }
    Snd.hit();
  } else { // نبضة جاذبية: تقلب جاذبية اللاعب + حلقة رصاص صغيرة (ميكانيكا مختلفة تماماً)
    doFlip();
    const n=6; for(let i=0;i<n;i++){ const a=i/n*Math.PI*2;
      G.ebullets.push({x:bo.x,y:bo.y,vx:Math.cos(a)*sp*0.8,vy:Math.sin(a)*sp*0.8,life:CFG.EBULLET_LIFE}); }
    Snd.trip();
  }
}
function updateEbullets(L,p){
  const T=CFG.TILE, pcx=p.x+CFG.PSIZE/2, pcy=p.y+CFG.PSIZE/2;
  for(let i=G.ebullets.length-1;i>=0;i--){
    const b=G.ebullets[i]; b.x+=b.vx; b.y+=b.vy; b.life--;
    let dead=b.life<=0;
    if(!dead){ const c=Math.floor(b.x/T), r=Math.floor(b.y/T); if(isSolid(L,r,c)) dead=true; }
    if(!dead){ const dx=b.x-pcx, dy=b.y-pcy;
      if(dx*dx+dy*dy < (CFG.EBULLET_R+CFG.PSIZE/2*0.7)*(CFG.EBULLET_R+CFG.PSIZE/2*0.7)){ killPlayer(); dead=true; } }
    if(dead) G.ebullets.splice(i,1);
  }
}

/* ————————————————— حلقة اللعب ————————————————— */
function updatePlay(){
  const p=G.player, L=G.level, T=CFG.TILE, S=CFG.PSIZE;
  G.time++; G.tick++;
  if(p.flipCD>0) p.flipCD--;
  if(p.fireCD>0) p.fireCD--;
  if(G.msgT>0) G.msgT--;

  // تحديث زاوية التصويب من الماوس (أو تصويب آلي للاختبار)
  updateAim();

  updatePlatforms(L);
  const ride=p.ride; if(ride){ p.x+=ride.dx; p.y+=ride.dy; }

  const dir=(KEYS.right?1:0)-(KEYS.left?1:0);
  if(dir!==0){ p.vx+=dir*CFG.RUN_ACC; p.vx=Math.max(-CFG.RUN_MAX,Math.min(CFG.RUN_MAX,p.vx)); p.facing=dir; }
  else { p.vx*=p.grounded?CFG.FRIC_GROUND:CFG.FRIC_AIR; if(Math.abs(p.vx)<0.1)p.vx=0; }

  p.vy+=CFG.GRAV*G.gravDir; p.vy=Math.max(-CFG.MAX_FALL,Math.min(CFG.MAX_FALL,p.vy));

  p.x+=p.vx; collideAxis(p,L,'x'); collidePlatformsX(p,L);
  const wasGrounded=p.grounded;
  p.y+=p.vy;
  const hitYg=collideAxis(p,L,'y');
  p.ride=null;
  const hitYp=collidePlatformsY(p,L);
  const hitY = hitYp!==0?hitYp:hitYg;
  p.grounded=(hitY!==0&&hitY===G.gravDir);

  if(p.grounded){ p.coyote=CFG.COYOTE;
    if(!wasGrounded&&p.airT>6){ p.squash=1; Snd.land(); spawnBurst(p.x+S/2,p.y+(G.gravDir>0?S:0),4,'#8aa7c7',1.6); }
    p.airT=0; triggerCrumbleUnder(p,L);
  } else { if(p.coyote>0)p.coyote--; p.airT++; }
  updateCrumble(p,L);

  if(KEYS.flipPressed){ KEYS.flipPressed=false;
    if(p.grounded||p.coyote>0) doFlip(); else p.buffer=CFG.BUFFER;
  } else if(p.buffer>0){ p.buffer--; if(p.grounded) doFlip(); }

  // إطلاق (من الماوس أو الآلي)
  if(KEYS.firePressed){ KEYS.firePressed=false; tryShoot(); }
  if(G.debug.autoAim) botCombat();

  if(p.rotT<1) p.rotT=Math.min(1,p.rotT+1/11);
  if(p.squash>0) p.squash=Math.max(0,p.squash-0.12);
  G.gravBlend += ((G.gravDir<0?1:0)-G.gravBlend)*0.08;

  if(p.y<-60||p.y>L.h+60){ killPlayer(); return; }

  // أسلاك
  for(const tw of L.trips){ if(aabb(p.x,p.y,S,S,tw.c*T+4,tw.r*T,T-8,T)){
    if(p.flipCD<=0){ doFlip(); p.flipCD=CFG.TRIP_COOLDOWN; Snd.trip(); } break; } }

  // شوك
  const px0=p.x+3,px1=p.x+S-3,py0=p.y+3,py1=p.y+S-3;
  for(const s of L.spikes){ const x=s.c*T,y=s.r*T; let hx0,hx1,hy0,hy1;
    if(s.type==='up'){hx0=x+9;hx1=x+27;hy0=y+20;hy1=y+36;}
    else if(s.type==='down'){hx0=x+9;hx1=x+27;hy0=y;hy1=y+16;}
    else if(s.type==='right'){hx0=x;hx1=x+16;hy0=y+9;hy1=y+27;}
    else {hx0=x+20;hx1=x+36;hy0=y+9;hy1=y+27;}
    if(px1>hx0&&px0<hx1&&py1>hy0&&py0<hy1){ killPlayer(); return; }
  }

  updateBullets(L);
  if(updateEnemies(L,px0,px1,py0,py1)) return;
  if(G.boss){ updateBoss(L,p); if(G.state!=='play') return; updateEbullets(L,p); if(G.state!=='play') return; }

  // بوابة الخروج مفتوحة؟
  if(G.debug.autoGate) G.gateOpen = true;
  else if(!G.level.boss) G.gateOpen = liveEnemies()===0;

  // checkpoints
  for(const cp of L.checkpoints){ const cx=cp.c*T,cy=cp.r*T;
    if(p.x+S>cx&&p.x<cx+T&&p.y+S>cy&&p.y<cy+T){ if(!cp.active){ cp.active=true;
      G.checkpoint={ x:cx+T/2-S/2, y:cy+(G.gravDir>0?T-S:0), grav:G.gravDir }; Snd.checkpoint();
      spawnBurst(cx+T/2,cy+T/2,8,'#4dffa6',2.5); } } }

  // النجمة — فقط لو البوابة مفتوحة
  const st=L.star;
  if(st && G.gateOpen){ const dx=(p.x+S/2)-st.x, dy=(p.y+S/2)-st.y;
    if(dx*dx+dy*dy < CFG.STAR_R*CFG.STAR_R*2.4){ G.state='levelend'; G.stateT=0; Snd.winLevel(); spawnBurst(st.x,st.y,26,'#ffd94d',4.5); } }

  const target=Math.max(0,Math.min(p.x-CFG.W/2+S/2, L.w-CFG.W));
  G.camX += (target-G.camX)*0.15;
}

function update(){
  if(G.shake>0) G.shake-=1;
  if(G.flashT>0) G.flashT--;
  updateParticles();
  switch(G.state){
    case 'play': updatePlay(); break;
    case 'dead': G.stateT++; if(G.stateT>=CFG.DEATH_FRAMES){ respawn(); G.state='play'; } break;
    case 'levelend': G.stateT++; if(G.stateT>=55){ if(G.lvl+1<LEVELS.length) loadLevel(G.lvl+1); else G.state='won'; } break;
  }
}
function startGame(){ G.deaths=0; G.time=0; loadLevel(0); }

/* ————————————————— تصويب: ماوس أو آلي ————————————————— */
function updateAim(){
  const p=G.player, cx=p.x+CFG.PSIZE/2, cy=p.y+CFG.PSIZE/2;
  if(G.debug.autoAim){
    const t=nearestLiveTarget();
    if(t) p.aim=Math.atan2(t.y-cy, t.x-cx);
    return;
  }
  // إحداثيات الماوس في عالم اللعبة (بعد الكاميرا)
  const wx=mouse.x+Math.round(G.camX), wy=mouse.y;
  p.aim=Math.atan2(wy-cy, wx-cx);
}
function nearestLiveTarget(){
  const p=G.player, cx=p.x+CFG.PSIZE/2, cy=p.y+CFG.PSIZE/2;
  let best=null, bd=1e9;
  if(G.boss&&G.boss.alive){ best={x:G.boss.x,y:G.boss.y}; bd=(G.boss.x-cx)**2+(G.boss.y-cy)**2; }
  for(const e of G.level.enemies){ if(!e.alive) continue; const d=(e.x-cx)**2+(e.y-cy)**2; if(d<bd){bd=d;best={x:e.x,y:e.y};} }
  return best;
}
// ذكاء قتال للبوت: صوّب على الأقرب واطلق لو فيه خط رؤية
function botCombat(){
  const p=G.player; if(p.fireCD>0||G.ammo<=0) return;
  const t=nearestLiveTarget(); if(!t) return;
  const cx=p.x+CFG.PSIZE/2, cy=p.y+CFG.PSIZE/2;
  if(!lineClear(cx,cy,t.x,t.y)) return;
  const d2=(t.x-cx)**2+(t.y-cy)**2; if(d2>440*440) return;
  tryShoot();
}
function lineClear(x0,y0,x1,y1){
  const T=CFG.TILE, steps=Math.ceil(Math.hypot(x1-x0,y1-y0)/8);
  for(let i=1;i<steps;i++){ const t=i/steps, x=x0+(x1-x0)*t, y=y0+(y1-y0)*t;
    if(isSolid(G.level,Math.floor(y/T),Math.floor(x/T))) return false; }
  return true;
}

/* ————————————————— جسيمات ————————————————— */
function spawnBurst(x,y,n,col,speed){
  for(let i=0;i<n;i++){ const a=Math.random()*Math.PI*2, v=(0.3+Math.random()*0.7)*speed;
    G.particles.push({ x,y, vx:Math.cos(a)*v, vy:Math.sin(a)*v, life:1, decay:0.03+Math.random()*0.03,
      col, size:2+Math.random()*3 }); }
}
function updateParticles(){
  for(let i=G.particles.length-1;i>=0;i--){ const p=G.particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vx*=0.96; p.vy*=0.96; p.life-=p.decay; if(p.life<=0) G.particles.splice(i,1); }
}

/* ————————————————— الرسم ————————————————— */
const cv=document.getElementById('game'), ctx=cv.getContext('2d');
const THEMES=[
  { down:{top:[11,21,38],bot:[18,35,61]}, up:{top:[25,15,43],bot:[43,23,71]},
    tileA:[53,80,122], tileB:[74,58,120], edgeA:[93,138,184], edgeB:[130,104,190], player:'#4de3ff' },
  { down:{top:[32,12,20],bot:[58,20,30]}, up:{top:[40,12,30],bot:[74,20,46]},
    tileA:[120,54,60], tileB:[120,60,96], edgeA:[196,96,104], edgeB:[196,116,158], player:'#ffe14d' },
];
const lerp=(a,b,t)=>a+(b-a)*t;
const lerpC=(c1,c2,t)=>`rgb(${c1.map((v,i)=>Math.round(lerp(v,c2[i],t))).join(',')})`;
const STARS=(()=>{ const arr=[]; let s=12345; const rnd=()=>(s=(s*1103515245+12345)&0x7fffffff)/0x7fffffff;
  for(let i=0;i<70;i++) arr.push({x:rnd()*2400,y:rnd()*540,z:0.15+rnd()*0.3,r:0.5+rnd()*1.3}); return arr; })();
let frameCount=0;

function drawSpike(s,T){ const x=s.c*T,y=s.r*T; ctx.beginPath();
  if(s.type==='up'){ctx.moveTo(x+2,y+T);ctx.lineTo(x+T/2,y+T-22);ctx.lineTo(x+T-2,y+T);}
  else if(s.type==='down'){ctx.moveTo(x+2,y);ctx.lineTo(x+T/2,y+22);ctx.lineTo(x+T-2,y);}
  else if(s.type==='right'){ctx.moveTo(x,y+2);ctx.lineTo(x+22,y+T/2);ctx.lineTo(x,y+T-2);}
  else {ctx.moveTo(x+T,y+2);ctx.lineTo(x+T-22,y+T/2);ctx.lineTo(x+T,y+T-2);} ctx.closePath(); ctx.fill(); }

function render(){
  frameCount++;
  const W=CFG.W,H=CFG.H,T=CFG.TILE;
  const th = THEMES[(G.level&&G.level.theme)||0];
  const t=G.gravBlend;
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0, lerpC(th.down.top, th.up.top, t));
  grad.addColorStop(1, lerpC(th.down.bot, th.up.bot, t));
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);

  ctx.save();
  for(const s of STARS){ const sx=((s.x-G.camX*s.z)%2400+2400)%2400-720; if(sx<-10||sx>W+10) continue;
    ctx.globalAlpha=0.25+0.2*Math.sin(frameCount*0.03+s.x); ctx.fillStyle='#cfe4ff'; ctx.fillRect(sx,s.y,s.r,s.r); }
  ctx.restore();

  if(!G.level || G.state==='menu'||G.state==='langselect'||G.state==='won'||(G.state==='settings'&&G.settingsReturn==='menu')){
    renderUI(); return;
  }

  ctx.save();
  if(G.shake>0) ctx.translate((Math.random()-0.5)*G.shake*1.3,(Math.random()-0.5)*G.shake*1.3);
  ctx.translate(-Math.round(G.camX),0);
  const L=G.level;
  const c0=Math.max(0,Math.floor(G.camX/T)-1), c1=Math.min(L.cols-1,Math.ceil((G.camX+W)/T)+1);

  const tileBase=lerpC(th.tileA, th.tileB, t), tileEdge=lerpC(th.edgeA, th.edgeB, t);
  for(let r=0;r<L.rows;r++)for(let c=c0;c<=c1;c++){
    if(!L.solid[r][c]||L.crumbleMap[r+','+c]) continue;
    const x=c*T,y=r*T; ctx.fillStyle=tileBase; ctx.fillRect(x,y,T,T); ctx.fillStyle=tileEdge;
    if(!isSolid(L,r-1,c)) ctx.fillRect(x,y,T,3); if(!isSolid(L,r+1,c)) ctx.fillRect(x,y+T-3,T,3);
  }
  for(const o of L.crumble){ const x=o.c*T,y=o.r*T;
    if(o.state==='gone'){ ctx.globalAlpha=0.12; ctx.fillStyle='#6b5030'; ctx.fillRect(x+3,y+3,T-6,T-6); ctx.globalAlpha=1; continue; }
    let jx=0,jy=0; if(o.state==='warn'){ jx=(Math.random()-0.5)*3; jy=(Math.random()-0.5)*3; }
    ctx.fillStyle=o.state==='warn'?'#b5763a':'#8a5f34'; ctx.fillRect(x+jx,y+jy,T,T);
    ctx.strokeStyle='rgba(30,18,8,0.6)'; ctx.lineWidth=1.5; ctx.beginPath();
    ctx.moveTo(x+8+jx,y+jy);ctx.lineTo(x+14+jx,y+18+jy);ctx.lineTo(x+6+jx,y+T+jy);
    ctx.moveTo(x+24+jx,y+jy);ctx.lineTo(x+20+jx,y+16+jy);ctx.lineTo(x+28+jx,y+T+jy); ctx.stroke(); }
  for(const pl of L.platforms){
    ctx.fillStyle='#3b6ea5'; ctx.fillRect(pl.x,pl.y,pl.w,pl.h);
    ctx.fillStyle='#6fa8dc'; ctx.fillRect(pl.x,pl.y,pl.w,3); ctx.fillRect(pl.x,pl.y+pl.h-3,pl.w,3);
    ctx.fillStyle='rgba(230,240,255,0.55)'; const cxp=pl.x+pl.w/2,cyp=pl.y+pl.h/2; ctx.beginPath();
    if(pl.axis==='h'){ ctx.moveTo(cxp-10,cyp);ctx.lineTo(cxp-4,cyp-5);ctx.lineTo(cxp-4,cyp+5);
      ctx.moveTo(cxp+10,cyp);ctx.lineTo(cxp+4,cyp-5);ctx.lineTo(cxp+4,cyp+5); }
    else { ctx.moveTo(cxp,cyp-9);ctx.lineTo(cxp-5,cyp-3);ctx.lineTo(cxp+5,cyp-3);
      ctx.moveTo(cxp,cyp+9);ctx.lineTo(cxp-5,cyp+3);ctx.lineTo(cxp+5,cyp+3); } ctx.fill();
  }
  for(const tw of L.trips){ const x=tw.c*T,y=tw.r*T,cy=y+T/2;
    ctx.strokeStyle='#c58bff'; ctx.globalAlpha=0.5+0.4*Math.sin(frameCount*0.15+tw.c); ctx.lineWidth=2.5;
    ctx.setLineDash([6,5]); ctx.beginPath(); ctx.moveTo(x,cy); ctx.lineTo(x+T,cy); ctx.stroke(); ctx.setLineDash([]); ctx.globalAlpha=1;
    ctx.fillStyle='rgba(197,139,255,0.9)'; ctx.beginPath();
    ctx.moveTo(x+T/2,y+6);ctx.lineTo(x+T/2-4,y+12);ctx.lineTo(x+T/2+4,y+12);
    ctx.moveTo(x+T/2,y+T-6);ctx.lineTo(x+T/2-4,y+T-12);ctx.lineTo(x+T/2+4,y+T-12); ctx.fill(); }
  ctx.fillStyle='#ff5566'; for(const s of L.spikes) drawSpike(s,T);

  for(const cp of L.checkpoints){ const x=cp.c*T,y=cp.r*T;
    const onCeil=isSolid(L,cp.r-1,cp.c)&&!isSolid(L,cp.r+1,cp.c); ctx.fillStyle=cp.active?'#4dffa6':'#5a6f8a';
    if(onCeil){ ctx.fillRect(x+13,y,4,26); ctx.beginPath(); ctx.moveTo(x+17,y+26);ctx.lineTo(x+29,y+20);ctx.lineTo(x+17,y+14); ctx.closePath(); ctx.fill(); }
    else { ctx.fillRect(x+13,y+T-26,4,26); ctx.beginPath(); ctx.moveTo(x+17,y+T-26);ctx.lineTo(x+29,y+T-20);ctx.lineTo(x+17,y+T-14); ctx.closePath(); ctx.fill(); }
    if(cp.active){ ctx.globalAlpha=0.25+0.15*Math.sin(frameCount*0.1); ctx.beginPath(); ctx.arc(x+T/2,y+T/2,16,0,7); ctx.fill(); ctx.globalAlpha=1; } }

  // أعداء أحياء
  for(const e of L.enemies){ if(!e.alive) continue;
    const pr=CFG.ENEMY_R+Math.sin((frameCount+e.phase)*0.12)*1.5, vertical=e.axis==='v';
    ctx.fillStyle=vertical?'#c774ff':'#ff9f43'; ctx.beginPath(); ctx.arc(e.x,e.y,pr,0,7); ctx.fill();
    ctx.fillStyle=vertical?'#7a2fb0':'#b3541e'; const ox=vertical?0:e.dir*3, oy=vertical?e.dir*3:0;
    ctx.beginPath(); ctx.arc(e.x+ox,e.y+oy,pr*0.45,0,7); ctx.fill(); }

  // طلقات العدو
  for(const b of G.ebullets){ ctx.fillStyle='#ff884d'; ctx.beginPath(); ctx.arc(b.x,b.y,CFG.EBULLET_R,0,7); ctx.fill();
    ctx.globalAlpha=0.3; ctx.beginPath(); ctx.arc(b.x,b.y,CFG.EBULLET_R+3,0,7); ctx.fill(); ctx.globalAlpha=1; }

  // الزعيم
  if(G.boss&&G.boss.alive) drawBoss(G.boss);

  // النجمة (تُرسم مُقفلة حتى تُفتح البوابة)
  if(L.star){ const st=L.star, rot=frameCount*0.02, open=G.gateOpen;
    const pulse=1+0.08*Math.sin(frameCount*0.08); ctx.save(); ctx.translate(st.x,st.y); ctx.rotate(rot); ctx.scale(pulse,pulse);
    ctx.globalAlpha=open?0.2:0.06; ctx.fillStyle=open?'#ffd94d':'#68708a'; ctx.beginPath(); ctx.arc(0,0,26,0,7); ctx.fill(); ctx.globalAlpha=1;
    ctx.fillStyle=open?'#ffd94d':'#6b7590'; ctx.beginPath();
    for(let i=0;i<10;i++){ const rr=i%2===0?15:6.5, a=i*Math.PI/5-Math.PI/2; ctx[i===0?'moveTo':'lineTo'](Math.cos(a)*rr,Math.sin(a)*rr); }
    ctx.closePath(); ctx.fill();
    if(!open){ ctx.rotate(-rot); ctx.strokeStyle='#39405a'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(0,3,5,Math.PI,0); ctx.stroke(); ctx.fillRect(-6,3,12,9); }
    ctx.restore(); }

  // طلقات اللاعب
  for(const b of G.bullets){ ctx.strokeStyle='#ffe08a'; ctx.lineWidth=3; ctx.beginPath();
    ctx.moveTo(b.x,b.y); ctx.lineTo(b.x-b.vx*1.2,b.y-b.vy*1.2); ctx.stroke();
    ctx.fillStyle='#fff2c2'; ctx.beginPath(); ctx.arc(b.x,b.y,CFG.BULLET_R,0,7); ctx.fill(); }

  for(const p of G.particles){ ctx.globalAlpha=Math.max(0,p.life); ctx.fillStyle=p.col; ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size); }
  ctx.globalAlpha=1;

  // اللاعب + المسدس
  if(G.state!=='dead'){ const p=G.player, S=CFG.PSIZE;
    const rot=(1-p.rotT)*Math.PI*p.facing, sq=1-p.squash*0.3;
    const cx=p.x+S/2, cy=p.y+S/2;
    // ماسورة المسدس ناحية التصويب
    ctx.save(); ctx.translate(cx,cy); ctx.rotate(p.aim);
    ctx.fillStyle='#0b2a3a'; ctx.fillRect(6,-3.5,18,7);
    ctx.fillStyle='#cfe4ff'; ctx.fillRect(20,-3.5,4,7); ctx.restore();
    // الجسم
    ctx.save(); ctx.translate(cx,cy); ctx.rotate(rot); ctx.scale(1/sq*(p.squash>0?1.15:1),sq);
    ctx.fillStyle=th.player; ctx.fillRect(-S/2,-S/2,S,S);
    ctx.fillStyle='#0b2a3a'; const ey=G.gravDir>0?-4:1;
    ctx.fillRect(p.facing*4-2,ey,3.5,3.5); ctx.fillRect(p.facing*10-2,ey,3.5,3.5); ctx.restore();
  }
  ctx.restore(); // كاميرا

  // crosshair عند الماوس (إحداثيات الشاشة)
  if(G.state==='play'){ ctx.strokeStyle='rgba(255,240,180,0.9)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(mouse.x,mouse.y,7,0,7); ctx.moveTo(mouse.x-11,mouse.y);ctx.lineTo(mouse.x-3,mouse.y);
    ctx.moveTo(mouse.x+3,mouse.y);ctx.lineTo(mouse.x+11,mouse.y); ctx.moveTo(mouse.x,mouse.y-11);ctx.lineTo(mouse.x,mouse.y-3);
    ctx.moveTo(mouse.x,mouse.y+3);ctx.lineTo(mouse.x,mouse.y+11); ctx.stroke(); }

  renderHUD();
  renderUI();
}

function drawBoss(bo){
  if(bo.type==='tyrant') return drawTyrant(bo);
  const flash = bo.hitFlash>0, warn = bo.windup>0;
  ctx.save(); ctx.translate(bo.x,bo.y);
  const gl = warn ? (0.4+0.4*Math.sin(frameCount*0.6)) : 0.2;
  ctx.globalAlpha=gl; ctx.fillStyle= warn?'#ff5566':'#ff9f43'; ctx.beginPath(); ctx.arc(0,0,bo.r+12,0,7); ctx.fill(); ctx.globalAlpha=1;
  ctx.fillStyle= flash?'#ffffff' : (bo.phase===2?'#ff5f6d':'#e0673a'); ctx.beginPath(); ctx.arc(0,0,bo.r,0,7); ctx.fill();
  ctx.fillStyle='#2a0d0d'; ctx.beginPath(); ctx.arc(0,0,bo.r*0.5,0,7); ctx.fill();
  ctx.fillStyle= warn?'#ffe14d':'#ffb0b0'; ctx.beginPath(); ctx.arc(0,0,bo.r*0.22,0,7); ctx.fill();
  ctx.restore();
}
// الطاغية: نجمة/ماسة شائكة بنفسجية دوّارة بعين — شكل مختلف تماماً عن الحارس
function drawTyrant(bo){
  const flash=bo.hitFlash>0, warn=bo.windup>0;
  // لون التحذير يختلف حسب نوع الهجمة القادمة (نبضة الجاذبية = بنفسجي وهّاج)
  const warnCol = bo.atkKind===2 ? '#c58bff' : '#ff77dd';
  ctx.save(); ctx.translate(bo.x,bo.y);
  const gl = warn ? (0.35+0.45*Math.sin(frameCount*0.7)) : 0.18;
  ctx.globalAlpha=gl; ctx.fillStyle=warn?warnCol:'#8a4dff'; ctx.beginPath(); ctx.arc(0,0,bo.r+16,0,7); ctx.fill(); ctx.globalAlpha=1;
  // جسم نجمي دوّار بأشواك
  ctx.rotate(bo.spin);
  const spikes=8, rOut=bo.r, rIn=bo.r*0.6;
  ctx.beginPath();
  for(let i=0;i<spikes*2;i++){ const rr=i%2===0?rOut:rIn, a=i*Math.PI/spikes; ctx[i===0?'moveTo':'lineTo'](Math.cos(a)*rr,Math.sin(a)*rr); }
  ctx.closePath();
  ctx.fillStyle= flash?'#ffffff' : (bo.phase===2?'#b34dff':'#7a3ad6'); ctx.fill();
  ctx.rotate(-bo.spin);
  // نواة داكنة + عين
  ctx.fillStyle='#1a0a2e'; ctx.beginPath(); ctx.arc(0,0,bo.r*0.5,0,7); ctx.fill();
  ctx.fillStyle= warn?'#ffe14d':'#e0b0ff'; ctx.beginPath(); ctx.arc(0,0,bo.r*0.24,0,7); ctx.fill();
  ctx.fillStyle='#1a0a2e'; ctx.beginPath(); ctx.arc(0,0,bo.r*0.1,0,7); ctx.fill();
  ctx.restore();
}

  else if(G.state==='play' && !G.level.boss && !G.gateOpen && liveEnemies()>0){
    ctx.globalAlpha=0.4; ctx.font='13px "Segoe UI",sans-serif'; ctx.fillStyle='#cfe4ff'; ctx.textAlign='center';
    ctx.fillText(tr('clearAll'), CFG.W/2, 90); ctx.globalAlpha=1; }

  if(G.flashT>0){ ctx.globalAlpha=Math.min(1,G.flashT/30); ctx.fillStyle='#eaf3ff';
    ctx.font='bold 26px "Segoe UI",sans-serif'; ctx.textAlign='center';
    ctx.fillText(LEVELS[G.lvl].name[LANG], CFG.W/2, 120); }
  ctx.restore();
}

/* ————————————————— UI: قوائم/إعدادات/اختيار لغة ————————————————— */
let uiButtons=[]; // {x,y,w,h,fn}
function button(x,y,w,h,label,fn,opts={}){
  const hot = mouse.x>=x&&mouse.x<=x+w&&mouse.y>=y&&mouse.y<=y+h;
  ctx.fillStyle = hot? 'rgba(77,227,255,0.18)':'rgba(120,150,190,0.10)';
  ctx.strokeStyle = hot? '#4de3ff':'rgba(150,180,220,0.45)'; ctx.lineWidth=1.5;
  ctx.fillRect(x,y,w,h); ctx.strokeRect(x,y,w,h);
  ctx.fillStyle= opts.color||'#eaf3ff'; ctx.font=opts.font||'18px "Segoe UI",sans-serif'; ctx.textAlign='center';
  ctx.textBaseline='middle'; ctx.fillText(label, x+w/2, y+h/2); ctx.textBaseline='alphabetic';
  uiButtons.push({x,y,w,h,fn});
}
function renderUI(){
  uiButtons=[]; ctx.save(); ctx.textAlign='center';
  if(G.state==='langselect'){
    ctx.fillStyle='#eaf3ff'; ctx.font='bold 40px "Segoe UI",sans-serif';
    ctx.fillText('انقلاب · FLIP', CFG.W/2, 150);
    ctx.font='20px "Segoe UI",sans-serif'; ctx.fillStyle='#8fb3d9';
    ctx.fillText('اختر اللغة  ·  Choose language', CFG.W/2, 210);
    button(CFG.W/2-220,260,200,70,'العربية',()=>{ LANG='ar'; saveSettings(); G.state='menu'; },{font:'24px "Segoe UI",sans-serif'});
    button(CFG.W/2+20,260,200,70,'English',()=>{ LANG='en'; saveSettings(); G.state='menu'; },{font:'24px "Segoe UI",sans-serif'});
  } else if(G.state==='menu'){
    ctx.fillStyle='#eaf3ff'; ctx.font='bold 72px "Segoe UI",sans-serif'; ctx.fillText(tr('title'), CFG.W/2, 165);
    ctx.font='19px "Segoe UI",sans-serif'; ctx.fillStyle='#8fb3d9'; ctx.fillText(tr('tagline'), CFG.W/2, 215);
    ctx.font='14px "Segoe UI",sans-serif'; ctx.globalAlpha=0.6;
    ctx.fillText(tr('hintCombat'), CFG.W/2, 258); ctx.globalAlpha=1;
    button(CFG.W/2-110,300,220,56, tr('press'),()=>startGame(),{font:'bold 22px "Segoe UI",sans-serif',color:'#4de3ff'});
    button(CFG.W/2-110,372,220,44, tr('settings'),()=>{ G.settingsReturn='menu'; G.state='settings'; });
  } else if(G.state==='settings'){
    // خلفية شبه شفافة فوق اللعب لو من الإيقاف
    if(G.settingsReturn==='play'){ ctx.fillStyle='rgba(6,10,18,0.78)'; ctx.fillRect(0,0,CFG.W,CFG.H); }
    ctx.fillStyle='#eaf3ff'; ctx.font='bold 34px "Segoe UI",sans-serif';
    ctx.fillText(G.settingsReturn==='play'? tr('paused') : tr('settings'), CFG.W/2, 110);
    slider(tr('music'), Snd.musicVol, 175, v=>Snd.setMusic(v));
    slider(tr('sfx'), Snd.sfxVol, 235, v=>Snd.setSfx(v));
    // لغة
    ctx.fillStyle='#cfe4ff'; ctx.font='18px "Segoe UI",sans-serif'; ctx.textAlign='center';
    ctx.fillText(tr('language'), CFG.W/2, 305);
    button(CFG.W/2-160,320,150,44,'العربية',()=>{ LANG='ar'; saveSettings(); },{color:LANG==='ar'?'#4de3ff':'#cfe4ff'});
    button(CFG.W/2+10,320,150,44,'English',()=>{ LANG='en'; saveSettings(); },{color:LANG==='en'?'#4de3ff':'#cfe4ff'});
    if(G.settingsReturn==='play'){
      button(CFG.W/2-235,395,150,44, tr('resume'),()=>{ G.state='play'; });
      button(CFG.W/2-75,395,150,44, tr('restart'),()=>{ loadLevel(G.lvl); });
      button(CFG.W/2+85,395,150,44, tr('toMenu'),()=>{ G.state='menu'; });
    } else {
      button(CFG.W/2-75,395,150,48, tr('back'),()=>{ G.state='menu'; });
    }
  } else if(G.state==='levelend'){
    ctx.globalAlpha=1; ctx.fillStyle='#eaf3ff'; ctx.font='bold 40px "Segoe UI",sans-serif';
    ctx.fillText(tr('done'), CFG.W/2, CFG.H/2-20);
  } else if(G.state==='won'){
    ctx.fillStyle='rgba(6,10,18,0.8)'; ctx.fillRect(0,0,CFG.W,CFG.H);
    ctx.fillStyle='#ffd94d'; ctx.font='bold 56px "Segoe UI",sans-serif'; ctx.fillText(tr('win'), CFG.W/2, 190);
    ctx.fillStyle='#cfe4ff'; ctx.font='22px "Segoe UI",sans-serif';
    const mm=Math.floor(G.time/3600), ss=Math.floor((G.time/60)%60);
    ctx.fillText(`${tr('deaths')}: ${G.deaths}`, CFG.W/2, 260);
    ctx.fillText(`${tr('time')}: ${mm}:${ss<10?'0':''}${ss}`, CFG.W/2, 295);
    button(CFG.W/2-110,340,220,50, tr('fromStart'),()=>startGame());
    button(CFG.W/2-110,400,220,42, tr('settings'),()=>{ G.settingsReturn='menu'; G.state='menu'; });
  }
  ctx.restore();
}
function slider(label,val,y,setter){
  const bx=CFG.W/2-150, bw=300;
  ctx.fillStyle='#cfe4ff'; ctx.font='18px "Segoe UI",sans-serif'; ctx.textAlign='center';
  ctx.fillText(`${label}: ${Math.round(val*100)}%`, CFG.W/2, y-8);
  // زر ناقص/زائد + شريط
  button(bx-52,y,40,30,'−',()=>setter(val-0.1),{font:'20px "Segoe UI",sans-serif'});
  button(bx+bw+12,y,40,30,'+',()=>setter(val+0.1),{font:'20px "Segoe UI",sans-serif'});
  ctx.fillStyle='rgba(120,150,190,0.25)'; ctx.fillRect(bx,y+6,bw,18);
  ctx.fillStyle='#4de3ff'; ctx.fillRect(bx,y+6,bw*val,18);
  ctx.strokeStyle='rgba(150,180,220,0.5)'; ctx.lineWidth=1; ctx.strokeRect(bx,y+6,bw,18);
  // النقر على الشريط يضبط القيمة
  uiButtons.push({x:bx,y:y+6,w:bw,h:18,fn:()=>setter((mouse.x-bx)/bw)});
}

/* ————————————————— الإدخال ————————————————— */
const KEYS={ left:false, right:false, flipPressed:false, firePressed:false };
const mouse={ x:CFG.W/2, y:CFG.H/2 };

function firstInteract(){ Snd.init(); Snd.resume(); }

function handleKey(code,down,repeat){
  if(down) firstInteract();
  if(down && !repeat && (code==='Escape')){
    if(G.state==='play'){ G.settingsReturn='play'; G.state='settings'; return; }
    if(G.state==='settings' && G.settingsReturn==='play'){ G.state='play'; return; }
  }
  if(down && !repeat && G.state==='menu' && code!=='KeyM' && code!=='Escape'){ startGame(); return; }
  switch(code){
    case 'ArrowLeft': case 'KeyA': KEYS.left=down; break;
    case 'ArrowRight': case 'KeyD': KEYS.right=down; break;
    case 'Space': case 'ArrowUp': case 'KeyW': if(down&&!repeat) KEYS.flipPressed=true; break;
    case 'KeyR': if(down&&!repeat){ if(G.state==='won') startGame(); else if(G.state==='play'||G.state==='dead') loadLevel(G.lvl); } break;
    case 'KeyM': if(down&&!repeat) Snd.toggleMute(); break;
  }
}
window.addEventListener('keydown', e=>{ if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault(); handleKey(e.code,true,e.repeat); });
window.addEventListener('keyup', e=>handleKey(e.code,false,false));

function setMouse(e){ const r=cv.getBoundingClientRect(); mouse.x=(e.clientX-r.left)/r.width*CFG.W; mouse.y=(e.clientY-r.top)/r.height*CFG.H; }
window.addEventListener('mousemove', setMouse);
window.addEventListener('mousedown', e=>{
  firstInteract(); setMouse(e);
  // UI أولاً
  for(const b of uiButtons){ if(mouse.x>=b.x&&mouse.x<=b.x+b.w&&mouse.y>=b.y&&mouse.y<=b.y+b.h){ b.fn(); return; } }
  if(G.state==='play'){ KEYS.firePressed=true; }
});
// منع قائمة الزر الأيمن عشان اللعب
window.addEventListener('contextmenu', e=>e.preventDefault());

/* ————————————————— حلقة اللعبة 60Hz ————————————————— */
const STEP=1000/60; let acc=0, last=performance.now();
function frame(now){ acc+=Math.min(now-last,100); last=now; while(acc>=STEP){ update(); acc-=STEP; } render(); requestAnimationFrame(frame); }

/* بدء: حمّل الإعدادات ثم اختيار اللغة (أو القائمة لو محفوظ) */
if(loadSettings()) G.state='menu'; else G.state='langselect';
requestAnimationFrame(frame);

/* واجهة اختبار آلي (headless) */
window.GAME={ G, CFG, LEVELS, KEYS, mouse, I18N,
  loadLevel, startGame, update, render, handleKey, parseLevel, doFlip, isSolid, tryShoot,
  liveEnemies, refillAmmo, setLang:(l)=>{LANG=l;}, getLang:()=>LANG, Snd };
</script>
